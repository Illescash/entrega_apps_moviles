<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient for Copas (Red/Orange) -->
    <linearGradient id="bgGradCopa" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#140505"/>
      <stop offset="50%" stop-color="#2b0a0a"/>
      <stop offset="100%" stop-color="#100202"/>
    </linearGradient>

    <!-- Glowing Effects -->
    <filter id="neonGlowRed">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="neonGlowOrange">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Circuit Pattern for Background -->
    <pattern id="circuit" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 20 L 10 20 L 15 15 L 25 15 L 30 20 L 40 20 M 20 0 L 20 10 L 25 15 M 15 15 L 20 25 L 20 40" fill="none" stroke="#ff8800" stroke-width="0.5" stroke-opacity="0.15"/>
      <circle cx="10" cy="20" r="1" fill="#ff8800" fill-opacity="0.3"/>
      <circle cx="30" cy="20" r="1" fill="#ff8800" fill-opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Card Body -->
  <rect width="200" height="300" fill="url(#bgGradCopa)" rx="12" stroke="#444" stroke-width="1"/>
  <rect width="194" height="294" x="3" y="3" fill="url(#circuit)" rx="10"/>

  <!-- Cyberpunk Borders Copas -->
  <path d="M 12 12 L 40 12 M 160 12 L 188 12 M 188 12 L 188 40 M 188 260 L 188 288 M 188 288 L 160 288 M 40 288 L 12 288 M 12 288 L 12 260 M 12 40 L 12 12" fill="none" stroke="#ff8800" stroke-width="3" filter="url(#neonGlowOrange)"/>
  <path d="M 60 12 L 140 12 M 60 288 L 140 288 M 188 80 L 188 220 M 12 80 L 12 220" fill="none" stroke="#ff0055" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.8"/>

  <!-- Top-left Number -->
  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#fff" filter="url(#neonGlowOrange)">1</text>
  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#ff8800">1</text>

  <!-- Bottom-right Number -->
  <g transform="translate(178, 256) rotate(180)">
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#fff" filter="url(#neonGlowOrange)">1</text>
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#ff8800">1</text>
  </g>

  <!-- AS DE COPAS Central Graphic (Refined Version) -->
  <g id="cyberCopa" transform="translate(100, 150)">
    <!-- Aura (Rotating in place) -->
    <g transform="translate(0, -20)">
      <circle r="50" fill="none" stroke="#ff0055" stroke-width="2.5" stroke-dasharray="2,8" filter="url(#neonGlowRed)" opacity="0.4">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
      </circle>
      <circle r="46" fill="none" stroke="#ff8800" stroke-width="1.5" opacity="0.3">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="25s" repeatCount="indefinite"/>
      </circle>
    </g>
  
    <!-- Base / Support Structure -->
    <polygon points="-35,85 35,85 25,70 -25,70" fill="#1a0d0d" stroke="#ff0055" stroke-width="1.5"/>
    <path d="M -25,75 L 25,75" stroke="#ff8800" stroke-width="0.5" opacity="0.5"/>

    <!-- Stem (Reinforced) -->
    <path d="M -10,30 L -6,70 L 6,70 L 10,30 Z" fill="#0d0505" stroke="#ff8800" stroke-width="1.5"/>
    <line x1="0" y1="35" x2="0" y2="65" stroke="#ff0055" stroke-width="2" filter="url(#neonGlowRed)"/>
    
    <!-- Connector Hub -->
    <rect x="-12" y="25" width="24" height="8" fill="#2b0a0a" stroke="#ff0055" stroke-width="1" rx="2"/>
    
    <!-- Outer Bowl Housing -->
    <path d="M -50,-20 Q -45,30 0,30 Q 45,30 50,-20 Z" fill="#1a0a0a" stroke="#ff0055" stroke-width="2" filter="url(#neonGlowRed)"/>
    
    <!-- Inner Bowl (Crystal/Glass) -->
    <path d="M -42,-25 Q -38,20 0,20 Q 38,20 42,-25 Z" fill="#2b0d0d" stroke="#ff8800" stroke-width="1" opacity="0.8"/>
    
    <!-- Liquid / Energy Core with Internal Circuitry -->
    <path d="M -38,-20 Q 0,10 38,-20" fill="none" stroke="#ff8800" stroke-width="1" stroke-dasharray="2,4" opacity="0.6"/>
    <path d="M -35,-15 Q -30,5 0,5 Q 30,5 35,-15 Z" fill="#ff4400" opacity="0.4" filter="url(#neonGlowOrange)"/>
    
    <!-- Subtle rising data bits inside liquid -->
    <rect x="-15" y="-5" width="2" height="2" fill="#fff" opacity="0.6"/>
    <rect x="10" y="5" width="1.5" height="1.5" fill="#fff" opacity="0.4"/>
    <rect x="-5" y="12" width="1" height="1" fill="#fff" opacity="0.8"/>
    
    <!-- Rim Glow -->
    <ellipse cx="0" cy="-22" rx="42" ry="8" fill="none" stroke="#fff" stroke-width="1.5" filter="url(#neonGlowOrange)"/>
    <ellipse cx="0" cy="-22" rx="38" ry="6" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.5"/>
    
    <!-- Holographic Volumetric Projection -->
    <g opacity="0.7">
      <path d="M -25,-30 L -45,-90 L 45,-90 L 25,-30" fill="url(#neonGlowOrange)" opacity="0.05"/>
      <line x1="-25" y1="-30" x2="-45" y2="-90" stroke="#ff8800" stroke-width="0.5" stroke-dasharray="2,2"/>
      <line x1="25" y1="-30" x2="45" y2="-90" stroke="#ff8800" stroke-width="0.5" stroke-dasharray="2,2"/>
      
      <!-- Enhanced The Floating 'Soul' (Data Star) -->
      <g transform="translate(0, -60)">
        <!-- Vertical Bobbing Animation (Subtle) -->
        <animateTransform attributeName="transform" type="translate" values="0,-3; 0,3; 0,-3" dur="3s" repeatCount="indefinite" additive="sum"/>
        
        <!-- Multi-layered Star -->
        <g>
          <!-- Outer Pulsating Glow -->
          <circle r="15" fill="#ff0055" opacity="0.1" filter="url(#neonGlowRed)">
            <animate attributeName="r" values="12;18;12" dur="1.5s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.1;0.3;0.1" dur="1.5s" repeatCount="indefinite"/>
          </circle>

          <!-- Rotating Tech Ring around the star -->
          <circle r="22" fill="none" stroke="#ff8800" stroke-width="0.5" stroke-dasharray="4,12" opacity="0.5">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
          </circle>

          <!-- The Star Itself (Sharp & Premium) -->
          <polygon points="0,-18 5,-5 18,0 5,5 0,18 -5,5 -18,0 -5,-5" fill="#fff" filter="drop-shadow(0 0 10px #fff)"/>
          
          <!-- Inner Core Flare -->
          <circle r="5" fill="#fff" filter="url(#neonGlowOrange)">
            <animate attributeName="opacity" values="0.6;1;0.6" dur="0.8s" repeatCount="indefinite"/>
          </circle>
          
          <!-- Crosshair details -->
          <g stroke="#ff0055" stroke-width="0.5">
            <line x1="-22" y1="0" x2="-18" y2="0"/>
            <line x1="18" y1="0" x2="22" y2="0"/>
            <line x1="0" y1="-22" x2="0" y2="-18"/>
            <line x1="0" y1="18" x2="0" y2="22"/>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- Holographic overlay text -->
  <text x="100" y="280" font-family="'Courier New', monospace" font-size="8" fill="#ff8800" text-anchor="middle" letter-spacing="4" opacity="0.6">Peer2Play</text>
</svg>
