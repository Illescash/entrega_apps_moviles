<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient for Bastos (Dark Green) -->
    <linearGradient id="bgGradBasto" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05140a"/>
      <stop offset="50%" stop-color="#0a2b12"/>
      <stop offset="100%" stop-color="#021005"/>
    </linearGradient>

    <!-- Glowing Effects -->
    <filter id="neonGlowGreen">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonGlowLime">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Circuit Pattern for Background -->
    <pattern id="circuit" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 20 L 10 20 L 15 15 L 25 15 L 30 20 L 40 20 M 20 0 L 20 10 L 25 15 M 15 15 L 20 25 L 20 40" fill="none" stroke="#ccff00" stroke-width="0.5" stroke-opacity="0.15"/>
      <circle cx="10" cy="20" r="1" fill="#ccff00" fill-opacity="0.3"/>
      <circle cx="30" cy="20" r="1" fill="#ccff00" fill-opacity="0.3"/>
    </pattern>

    <!-- Reusable Cyber-Mace (smaller) -->
    <g id="maceSmall">
      <!-- Pommel -->
      <g transform="translate(0, 28)">
        <polygon points="-3,0 3,0 4,3 1,5 -1,5 -4,3" fill="#0a1a0a" stroke="#ccff00" stroke-width="0.8"/>
        <circle cx="0" cy="2.5" r="1" fill="#0a2b12" stroke="#00ff00" stroke-width="0.5"/>
      </g>

      <!-- Handle -->
      <rect x="-3" y="6" width="6" height="18" rx="1" fill="#071407" stroke="#00ff00" stroke-width="0.8"/>
      <line x1="0" y1="8" x2="0" y2="23" stroke="#00ff00" stroke-width="1" filter="url(#neonGlowGreen)" opacity="0.5"/>

      <!-- Guard -->
      <g transform="translate(0, 5)">
        <polygon points="-7,1 7,1 5,-2 -5,-2" fill="#0d1a0d" stroke="#ccff00" stroke-width="1" filter="url(#neonGlowLime)"/>
        <circle cx="0" cy="0" r="0.8" fill="#ccff00" filter="url(#neonGlowLime)"/>
      </g>

      <!-- Shaft -->
      <path d="M -4,4 L -5,-10 L 5,-10 L 4,4 Z" fill="#071407" stroke="#00ff00" stroke-width="1"/>
      <line x1="0" y1="4" x2="0" y2="-10" stroke="#fff" stroke-width="0.8" opacity="0.3" filter="drop-shadow(0 0 2px #ccff00)"/>

      <!-- Mace Head -->
      <g transform="translate(0, -12)">
        <polygon points="-10,-2 -6,-10 3,-12 3,-12 6,-10 10,-2 7,3 -7,3" fill="#0a1a0a" stroke="#00ff00" stroke-width="1"/>
        <polygon points="-7,-1 -4,-8 0,-9 4,-8 7,-1 5,2 -5,2" fill="#071407" stroke="#ccff00" stroke-width="0.5"/>

        <!-- Core -->
        <circle cx="0" cy="-4" r="4" fill="#021005" stroke="#00ff00" stroke-width="1"/>
        <circle cx="0" cy="-4" r="2.5" fill="#0a2b12" stroke="#ccff00" stroke-width="0.5"/>
        <polygon points="0,-6 1.5,-3 3,-4 1.5,-1 0,0 -1.5,-1 -3,-4 -1.5,-3" fill="#ccff00" filter="drop-shadow(0 0 3px #ccff00)"/>
        <circle cx="0" cy="-4" r="1.5" fill="#fff" opacity="0.4" filter="url(#neonGlowLime)"/>
      </g>
    </g>

    <!-- Floating Data Star -->
    <g id="floatingStar">
      <animateTransform attributeName="transform" type="translate" values="0,-2; 0,2; 0,-2" dur="3s" repeatCount="indefinite" additive="sum"/>
      <circle r="6" fill="#00ff00" opacity="0.1" filter="url(#neonGlowGreen)">
        <animate attributeName="r" values="4;7;4" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.1;0.3;0.1" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <polygon points="0,-7 2,-2 7,0 2,2 0,7 -2,2 -7,0 -2,-2" fill="#fff" filter="drop-shadow(0 0 5px #fff)"/>
      <circle r="2" fill="#fff" filter="url(#neonGlowLime)">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="0.8s" repeatCount="indefinite"/>
      </circle>
    </g>
  </defs>

  <!-- Card Body -->
  <rect width="200" height="300" fill="url(#bgGradBasto)" rx="12" stroke="#444" stroke-width="1"/>
  <rect width="194" height="294" x="3" y="3" fill="url(#circuit)" rx="10"/>

  <!-- Cyberpunk Borders Bastos -->
  <path d="M 12 12 L 40 12 M 160 12 L 188 12 M 188 12 L 188 40 M 188 260 L 188 288 M 188 288 L 160 288 M 40 288 L 12 288 M 12 288 L 12 260 M 12 40 L 12 12" fill="none" stroke="#ccff00" stroke-width="3" filter="url(#neonGlowLime)"/>
  <path d="M 60 12 L 140 12 M 60 288 L 140 288 M 188 80 L 188 220 M 12 80 L 12 220" fill="none" stroke="#00ff00" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.8"/>

  <!-- Top-left Number -->
  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#fff" filter="url(#neonGlowLime)">3</text>
  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#ccff00">3</text>

  <!-- Bottom-right Number -->
  <g transform="translate(178, 256) rotate(180)">
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#fff" filter="url(#neonGlowLime)">3</text>
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#ccff00">3</text>
  </g>

  <!-- Three Bastos -->
  <use href="#maceSmall" x="100" y="50"/>
  <use href="#maceSmall" x="100" y="130"/>
  <use href="#maceSmall" x="100" y="210"/>

  <!-- Connecting Tech Lines -->
  <path d="M 100 85 L 100 110" fill="none" stroke="#00ff00" stroke-width="0.8" stroke-dasharray="4,2" opacity="0.6"/>
  <path d="M 100 165 L 100 190" fill="none" stroke="#00ff00" stroke-width="0.8" stroke-dasharray="4,2" opacity="0.6"/>
  <circle cx="100" cy="97" r="2" fill="#ccff00" filter="url(#neonGlowLime)"/>
  <circle cx="100" cy="177" r="2" fill="#ccff00" filter="url(#neonGlowLime)"/>

  <!-- Floating Stars -->
  <g transform="translate(100, 25) scale(0.6)"><use href="#floatingStar"/></g>
  <g transform="translate(100, 255) scale(0.6)"><use href="#floatingStar"/></g>

  <!-- Holographic overlay text -->
  <text x="100" y="280" font-family="'Courier New', monospace" font-size="8" fill="#ccff00" text-anchor="middle" letter-spacing="4" opacity="0.6">Peer2Play</text>
</svg>