<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradEspada" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050a14"/>
      <stop offset="50%" stop-color="#0a152b"/>
      <stop offset="100%" stop-color="#020510"/>
    </linearGradient>
    <filter id="neonGlowBlue">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="6" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonGlowCyan">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="6" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="circuit" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 20 L 10 20 L 15 15 L 25 15 L 30 20 L 40 20 M 20 0 L 20 10 L 25 15 M 15 15 L 20 25 L 20 40" fill="none" stroke="#00ffff" stroke-width="0.5" stroke-opacity="0.15"/>
      <circle cx="10" cy="20" r="1" fill="#00ffff" fill-opacity="0.3"/>
      <circle cx="30" cy="20" r="1" fill="#00ffff" fill-opacity="0.3"/>
    </pattern>

    <g id="swordBase">
      <polygon points="-3,26 3,26 4,30 0,33 -4,30" fill="#0a0a1e" stroke="#00ffff" stroke-width="0.8"/>
      <circle cx="0" cy="29" r="0.8" fill="#00ffff" filter="url(#neonGlowCyan)"/>
      <rect x="-2.2" y="8" width="4.4" height="18" fill="#050a14" stroke="#0088ff" stroke-width="0.8"/>
      <line x1="-2.2" y1="12" x2="2.2" y2="10.8" stroke="#00ffff" stroke-width="0.5" opacity="0.6"/>
      <line x1="-2.2" y1="17" x2="2.2" y2="15.8" stroke="#00ffff" stroke-width="0.5" opacity="0.6"/>
      <line x1="-2.2" y1="22" x2="2.2" y2="20.8" stroke="#00ffff" stroke-width="0.5" opacity="0.6"/>
      <polygon points="-12,8 12,8 10,3 -10,3" fill="#0d0d20" stroke="#0088ff" stroke-width="0.8" filter="url(#neonGlowBlue)"/>
      <circle cx="-8" cy="5.5" r="1" fill="#00ffff"/>
      <circle cx="8" cy="5.5" r="1" fill="#00ffff"/>
      <polygon points="-4.2,3 4.2,3 2,-28 0,-34 -2,-28" fill="#0088ff" opacity="0.2" filter="url(#neonGlowCyan)"/>
      <polygon points="-3.8,3 3.8,3 1.8,-26 0,-32 -1.8,-26" fill="#0a152b" stroke="#00ffff" stroke-width="0.8"/>
      <polygon points="-1.5,3 1.5,3 0.8,-24 0,-29 -0.8,-24" fill="#ccf0ff" opacity="0.8"/>
      <line x1="0" y1="2" x2="0" y2="-28" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
    </g>
  </defs>

  <rect width="200" height="300" fill="url(#bgGradEspada)" rx="12" stroke="#444" stroke-width="1"/>
  <rect width="194" height="294" x="3" y="3" fill="url(#circuit)" rx="10"/>
  <path d="M 12 12 L 40 12 M 160 12 L 188 12 M 188 12 L 188 40 M 188 260 L 188 288 M 188 288 L 160 288 M 40 288 L 12 288 M 12 288 L 12 260 M 12 40 L 12 12" fill="none" stroke="#00ffff" stroke-width="3" filter="url(#neonGlowCyan)"/>

  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#fff" filter="url(#neonGlowCyan)">6</text>
  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#00ffff">6</text>
  <g transform="translate(178, 256) rotate(180)">
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#fff" filter="url(#neonGlowCyan)">6</text>
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#00ffff">6</text>
  </g>

  <!-- Six Swords (floating, 2 columns of 3) -->
  <g><animateTransform attributeName="transform" type="translate" values="0,0; 0,-2.5; 0,0" dur="3s" repeatCount="indefinite"/><use href="#swordBase" x="65" y="70"/></g>
  <g><animateTransform attributeName="transform" type="translate" values="0,0; 0,-2.5; 0,0" dur="3.3s" repeatCount="indefinite"/><use href="#swordBase" x="135" y="70"/></g>
  <g><animateTransform attributeName="transform" type="translate" values="0,0; 0,-2.5; 0,0" dur="3.5s" repeatCount="indefinite"/><use href="#swordBase" x="65" y="150"/></g>
  <g><animateTransform attributeName="transform" type="translate" values="0,0; 0,-2.5; 0,0" dur="3.2s" repeatCount="indefinite"/><use href="#swordBase" x="135" y="150"/></g>
  <g><animateTransform attributeName="transform" type="translate" values="0,0; 0,-2.5; 0,0" dur="3.6s" repeatCount="indefinite"/><use href="#swordBase" x="65" y="230"/></g>
  <g><animateTransform attributeName="transform" type="translate" values="0,0; 0,-2.5; 0,0" dur="3.4s" repeatCount="indefinite"/><use href="#swordBase" x="135" y="230"/></g>

  <text x="100" y="280" font-family="'Courier New', monospace" font-size="8" fill="#00ffff" text-anchor="middle" letter-spacing="4" opacity="0.6">Peer2Play</text>
</svg>
