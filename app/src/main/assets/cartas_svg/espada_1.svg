<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient for Espadas (Dark Blue/Navy) -->
    <linearGradient id="bgGradEspada" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050a14"/>
      <stop offset="50%" stop-color="#0a152b"/>
      <stop offset="100%" stop-color="#020510"/>
    </linearGradient>

    <!-- Blade Gradient -->
    <linearGradient id="bladeGrad" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#88ddff"/>
      <stop offset="40%" stop-color="#ccf0ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <!-- Blade Edge Gradient -->
    <linearGradient id="bladeEdge" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#0088ff"/>
      <stop offset="50%" stop-color="#00ccff"/>
      <stop offset="100%" stop-color="#00ffff"/>
    </linearGradient>

    <!-- Glowing Effects -->
    <filter id="neonGlowBlue">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="neonGlowCyan">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Circuit Pattern for Background -->
    <pattern id="circuit" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 20 L 10 20 L 15 15 L 25 15 L 30 20 L 40 20 M 20 0 L 20 10 L 25 15 M 15 15 L 20 25 L 20 40" fill="none" stroke="#00ffff" stroke-width="0.5" stroke-opacity="0.15"/>
      <circle cx="10" cy="20" r="1" fill="#00ffff" fill-opacity="0.3"/>
      <circle cx="30" cy="20" r="1" fill="#00ffff" fill-opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Card Body -->
  <rect width="200" height="300" fill="url(#bgGradEspada)" rx="12" stroke="#444" stroke-width="1"/>
  <rect width="194" height="294" x="3" y="3" fill="url(#circuit)" rx="10"/>

  <!-- Cyberpunk Borders Espadas -->
  <path d="M 12 12 L 40 12 M 160 12 L 188 12 M 188 12 L 188 40 M 188 260 L 188 288 M 188 288 L 160 288 M 40 288 L 12 288 M 12 288 L 12 260 M 12 40 L 12 12" fill="none" stroke="#00ffff" stroke-width="3" filter="url(#neonGlowCyan)"/>
  <path d="M 60 12 L 140 12 M 60 288 L 140 288 M 188 80 L 188 220 M 12 80 L 12 220" fill="none" stroke="#0088ff" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.8"/>

  <!-- Top-left Number -->
  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#fff" filter="url(#neonGlowCyan)">1</text>
  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#00ffff">1</text>

  <!-- Bottom-right Number -->
  <g transform="translate(178, 256) rotate(180)">
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#fff" filter="url(#neonGlowCyan)">1</text>
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#00ffff">1</text>
  </g>

  <!-- AS DE ESPADAS - PLASMA KATANA -->
  <g transform="translate(100, 155)">

    <!-- === DRAMATIC ENERGY SLASH ARC (behind everything) === -->
    <path d="M -60,90 Q 50,-30 -30,-110 Q -15,-50 40,70" fill="none" stroke="#0044ff" stroke-width="2.5" filter="url(#neonGlowBlue)" opacity="0.5"/>
    <path d="M -55,85 Q 45,-25 -25,-105" fill="none" stroke="#00ccff" stroke-width="1" stroke-dasharray="6,8" opacity="0.3"/>

    <!-- === AMBIENT AURA (rotating slow ring behind sword) === -->
    <ellipse cx="0" cy="-10" rx="55" ry="80" fill="none" stroke="#0044ff" stroke-width="1" stroke-dasharray="3,15" opacity="0.2" filter="url(#neonGlowBlue)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="25s" repeatCount="indefinite"/>
    </ellipse>

    <!-- === POMMEL (Bottom of hilt) === -->
    <g transform="translate(0, 85)">
      <!-- Pommel body -->
      <polygon points="-10,0 10,0 14,12 5,20 -5,20 -14,12" fill="#0a0a1e" stroke="#00ffff" stroke-width="1.5"/>
      <!-- Pommel core gem -->
      <circle cx="0" cy="10" r="4" fill="#0a152b" stroke="#0088ff" stroke-width="1.5"/>
      <circle cx="0" cy="10" r="2" fill="#00ffff" filter="url(#neonGlowCyan)">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
      </circle>
      <!-- Pommel cap detail -->
      <line x1="-8" y1="3" x2="8" y2="3" stroke="#0088ff" stroke-width="0.8" opacity="0.6"/>
    </g>

    <!-- === HANDLE / GRIP === -->
    <rect x="-7" y="30" width="14" height="55" rx="2" fill="#050a14" stroke="#0088ff" stroke-width="2"/>
    <!-- Grip wrapping (diagonal lines, like tsuka-ito) -->
    <g stroke="#00ffff" stroke-width="1" opacity="0.7">
      <line x1="-7" y1="37" x2="7" y2="33"/>
      <line x1="-7" y1="44" x2="7" y2="40"/>
      <line x1="-7" y1="51" x2="7" y2="47"/>
      <line x1="-7" y1="58" x2="7" y2="54"/>
      <line x1="-7" y1="65" x2="7" y2="61"/>
      <line x1="-7" y1="72" x2="7" y2="68"/>
      <line x1="-7" y1="79" x2="7" y2="75"/>
    </g>
    <!-- Central grip conduit -->
    <line x1="0" y1="32" x2="0" y2="83" stroke="#0088ff" stroke-width="1.5" filter="url(#neonGlowBlue)" opacity="0.5"/>
    <!-- Grip nodes -->
    <circle cx="0" cy="42" r="1.5" fill="#00ffff" opacity="0.8"/>
    <circle cx="0" cy="57" r="1.5" fill="#00ffff" opacity="0.8"/>
    <circle cx="0" cy="72" r="1.5" fill="#00ffff" opacity="0.8"/>

    <!-- === CROSSGUARD / TSUBA (Elaborate) === -->
    <g transform="translate(0, 25)">
      <!-- Main guard bar -->
      <polygon points="-40,5 40,5 35,-5 -35,-5" fill="#0d0d20" stroke="#0088ff" stroke-width="2" filter="url(#neonGlowBlue)"/>
      <!-- Guard upper edge glow -->
      <line x1="-35" y1="-5" x2="35" y2="-5" stroke="#00ffff" stroke-width="1.5" filter="url(#neonGlowCyan)"/>
      <!-- Swept wing extensions -->
      <path d="M -35,0 L -48,-10 L -42,-15 L -30,-5" fill="#0a0a1e" stroke="#00ffff" stroke-width="1.5"/>
      <path d="M 35,0 L 48,-10 L 42,-15 L 30,-5" fill="#0a0a1e" stroke="#00ffff" stroke-width="1.5"/>
      <!-- Guard energy nodes -->
      <circle cx="-30" cy="0" r="3.5" fill="#0a152b" stroke="#00ffff" stroke-width="1.5"/>
      <circle cx="-30" cy="0" r="1.5" fill="#00ffff" filter="url(#neonGlowCyan)"/>
      <circle cx="30" cy="0" r="3.5" fill="#0a152b" stroke="#00ffff" stroke-width="1.5"/>
      <circle cx="30" cy="0" r="1.5" fill="#00ffff" filter="url(#neonGlowCyan)"/>
      <!-- Wing tip nodes -->
      <circle cx="-45" cy="-12" r="2" fill="#0088ff" filter="url(#neonGlowBlue)"/>
      <circle cx="45" cy="-12" r="2" fill="#0088ff" filter="url(#neonGlowBlue)"/>
      <!-- Guard inner diamond detail -->
      <polygon points="0,-8 8,0 0,8 -8,0" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.5"/>
      <circle cx="0" cy="0" r="2" fill="#00ffff" filter="url(#neonGlowCyan)">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- === THE PLASMA BLADE === -->
    <!-- Blade outer glow (widest, most diffuse) -->
    <polygon points="-16,22 16,22 8,-85 0,-108 -8,-85" fill="url(#bladeEdge)" opacity="0.15" filter="url(#neonGlowCyan)"/>

    <!-- Blade body (main visible shape) -->
    <polygon points="-13,22 13,22 7,-83 0,-105 -7,-83" fill="url(#bladeEdge)" stroke="#00ffff" stroke-width="2" filter="url(#neonGlowCyan)"/>

    <!-- Blade inner core (brightest) -->
    <polygon points="-6,22 6,22 3,-78 0,-98 -3,-78" fill="url(#bladeGrad)"/>

    <!-- Blade center line (white-hot) -->
    <line x1="0" y1="20" x2="0" y2="-95" stroke="#fff" stroke-width="1.5" opacity="0.6"/>

    <!-- === HOLOGRAPHIC RUNES along blade === -->
    <g opacity="0.5" fill="none" stroke="#00ffff" stroke-width="0.8">
      <!-- Rune 1 -->
      <g transform="translate(-3, 5)">
        <rect x="0" y="0" width="4" height="6" rx="1"/>
        <line x1="2" y1="0" x2="2" y2="6"/>
      </g>
      <!-- Rune 2 -->
      <g transform="translate(1, -15)">
        <polygon points="0,0 4,0 2,-5"/>
        <line x1="2" y1="0" x2="2" y2="4"/>
      </g>
      <!-- Rune 3 -->
      <g transform="translate(-2, -35)">
        <circle cx="2" cy="2" r="2.5"/>
        <line x1="2" y1="-1" x2="2" y2="5"/>
      </g>
      <!-- Rune 4 -->
      <g transform="translate(0, -55)">
        <path d="M 0,0 L 3,-4 L 0,-8 L -3,-4 Z"/>
      </g>
    </g>

    <!-- === ENERGY PARTICLES flowing up the blade === -->
    <circle cx="-3" cy="10" r="1.2" fill="#fff" opacity="0.7">
      <animate attributeName="cy" values="15;-90" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="2" cy="0" r="1" fill="#00ffff" opacity="0.5">
      <animate attributeName="cy" values="10;-85" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-1" cy="5" r="0.8" fill="#fff" opacity="0.6">
      <animate attributeName="cy" values="20;-80" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <rect x="1" y="0" width="1" height="1" fill="#88ddff" opacity="0.5">
      <animate attributeName="y" values="5;-75" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0" dur="1.8s" repeatCount="indefinite"/>
    </rect>

    <!-- === ENERGY RINGS orbiting the blade === -->
    <!-- Lower ring -->
    <ellipse cx="0" cy="-10" rx="28" ry="7" fill="none" stroke="#0088ff" stroke-width="2" stroke-dasharray="5,8" filter="url(#neonGlowBlue)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Middle ring (counter-rotate) -->
    <ellipse cx="0" cy="-45" rx="22" ry="5" fill="none" stroke="#00ccff" stroke-width="1.5" stroke-dasharray="4,10" filter="url(#neonGlowCyan)">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="5s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Upper ring (smaller, faster) -->
    <ellipse cx="0" cy="-75" rx="15" ry="4" fill="none" stroke="#00ffff" stroke-width="1" stroke-dasharray="3,8">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </ellipse>

    <!-- === FLOATING STAR at blade tip === -->
    <g transform="translate(0, -112)">
      <animateTransform attributeName="transform" type="translate" values="0,-114; 0,-110; 0,-114" dur="3s" repeatCount="indefinite"/>
      <!-- Pulsating glow -->
      <circle r="12" fill="#0088ff" opacity="0.1" filter="url(#neonGlowBlue)">
        <animate attributeName="r" values="9;15;9" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.1;0.3;0.1" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <!-- Tech ring -->
      <circle r="18" fill="none" stroke="#00ffff" stroke-width="0.5" stroke-dasharray="4,10" opacity="0.5">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
      </circle>
      <!-- Star -->
      <polygon points="0,-14 4,-4 14,0 4,4 0,14 -4,4 -14,0 -4,-4" fill="#fff" filter="drop-shadow(0 0 10px #fff)"/>
      <!-- Core -->
      <circle r="4" fill="#fff" filter="url(#neonGlowCyan)">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="0.8s" repeatCount="indefinite"/>
      </circle>
      <!-- Crosshair -->
      <g stroke="#0088ff" stroke-width="0.5" opacity="0.6">
        <line x1="-18" y1="0" x2="-14" y2="0"/>
        <line x1="14" y1="0" x2="18" y2="0"/>
        <line x1="0" y1="-18" x2="0" y2="-14"/>
        <line x1="0" y1="14" x2="0" y2="18"/>
      </g>
    </g>

    <!-- === PROJECTION LINES from blade tip to star === -->
    <line x1="-4" y1="-100" x2="-8" y2="-108" stroke="#00ffff" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.4"/>
    <line x1="4" y1="-100" x2="8" y2="-108" stroke="#00ffff" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.4"/>

  </g>

  <!-- Holographic overlay text -->
  <text x="100" y="280" font-family="'Courier New', monospace" font-size="8" fill="#00ffff" text-anchor="middle" letter-spacing="4" opacity="0.6">Peer2Play</text>
</svg>
