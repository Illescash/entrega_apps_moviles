<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="50%" stop-color="#12122b"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>

    <!-- Glowing Effects -->
    <filter id="neonGlowCyan">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="neonGlowMagenta">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Coin Metallic Gradient -->
    <linearGradient id="goldGradient" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#fffb00"/>
      <stop offset="30%" stop-color="#ffcc00"/>
      <stop offset="70%" stop-color="#ff9900"/>
      <stop offset="100%" stop-color="#cc6600"/>
    </linearGradient>

    <!-- Circuit Pattern for Background -->
    <pattern id="circuit" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 20 L 10 20 L 15 15 L 25 15 L 30 20 L 40 20 M 20 0 L 20 10 L 25 15 M 15 15 L 20 25 L 20 40" fill="none" stroke="#00ffff" stroke-width="0.5" stroke-opacity="0.15"/>
    </pattern>

    <g id="cyberCoinFull">
      <circle cx="0" cy="0" r="26" fill="#1a1a1a" stroke="#333" stroke-width="3"/>
      <circle cx="0" cy="0" r="23" fill="url(#goldGradient)" filter="drop-shadow(0 0 6px #ffcc00)"/>
      <circle cx="0" cy="0" r="18" fill="none" stroke="#fff" stroke-width="1" stroke-opacity="0.3"/>
      <polygon points="0,-10 3,-3 10,0 3,3 0,10 -3,3 -10,0 -3,-3" fill="#fff" filter="drop-shadow(0 0 3px #fff)"/>
      <circle cx="0" cy="0" r="3.5" fill="#00ffff" filter="url(#neonGlowCyan)"/>
      <circle cx="0" cy="0" r="35" fill="none" stroke="#00ffff" stroke-width="1.5" stroke-dasharray="4,8">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
      </circle>
    </g>
  </defs>

  <rect width="200" height="300" fill="url(#bgGrad)" rx="12" stroke="#444" stroke-width="1"/>
  <rect width="194" height="294" x="3" y="3" fill="url(#circuit)" rx="10"/>

  <path d="M 12 12 L 40 12 M 160 12 L 188 12 M 188 12 L 188 40 M 188 260 L 188 288 M 188 288 L 160 288 M 40 288 L 12 288 M 12 288 L 12 260 M 12 40 L 12 12" fill="none" stroke="#00ffff" stroke-width="3" filter="url(#neonGlowCyan)"/>
  <path d="M 60 12 L 140 12 M 60 288 L 140 288 M 188 80 L 188 220 M 12 80 L 12 220" fill="none" stroke="#ff00ff" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.8"/>

  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#fff" filter="url(#neonGlowMagenta)">10</text>
  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#ff00ff">10</text>
  <g transform="translate(178, 256) rotate(180)">
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#fff" filter="url(#neonGlowMagenta)">10</text>
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#ff00ff">10</text>
  </g>

  <!-- LA NAVE (10): Cyber-Cruiser / Rocket (Resized & Repositioned) -->
  
  <!-- Ship Background Energy Shield / Aura (Moved up with ship) -->
  <g transform="translate(100, 100) scale(0.9)">
    <path d="M -45,-30 Q 0,-110 45,-30 Q 70,30 40,80 Q 0,110 -40,80 Q -70,30 -45,-30 Z" fill="none" stroke="#00ffff" stroke-width="1" stroke-dasharray="10,20" filter="url(#neonGlowCyan)" opacity="0.3"/>
  </g>

  <!-- The Coin (Oro) as the Hyper-Drive Core Exhaust (Positioned lower to avoid overlap) -->
  <g transform="translate(100, 215) scale(1)">
     
     <!-- Massive Thruster Plumes erupting FROM the ship above TO the coin -->
    <path d="M -15,-95 Q 0,-45 20,0 Q 0,40 -20,0 Q 0,-45 -15,-95 Z" fill="url(#neonGlowCyan)" opacity="0.6"/>
    <path d="M -8,-95 Q 0,-65 10,0 Q 0,20 -10,0 Q 0,-65 -8,-95 Z" fill="#fff" filter="url(#neonGlowCyan)"/>
    
     <use href="#cyberCoinFull"/>
     
    <!-- Extra propulsion rings around the coin -->
    <ellipse cx="0" cy="0" rx="45" ry="15" fill="none" stroke="#ff00ff" stroke-width="1.5" stroke-dasharray="4,8" filter="url(#neonGlowMagenta)" transform="rotate(-10)"/>
    <ellipse cx="0" cy="0" rx="55" ry="20" fill="none" stroke="#00ffff" stroke-width="1" stroke-dasharray="10,5" transform="rotate(10)"/>
  </g>

  <!-- The Ship itself, now smaller and higher up, revealing the coin below -->
  <g transform="translate(100, 100) scale(0.9)">
    <!-- Lower Hull / Engine Housing -->
    <path d="M -25,40 L -20,70 L -15,80 L -15,50 L -25,40 Z" fill="#151525" stroke="#ff00ff" stroke-width="1.5"/>
    <path d="M 25,40 L 20,70 L 15,80 L 15,50 L 25,40 Z" fill="#151525" stroke="#ff00ff" stroke-width="1.5"/>
    
    <!-- Main Hull Chassis -->
    <polygon points="-25,40 -35,5 -15,-30 0,-45 15,-30 35,5 25,40 15,45 -15,45" fill="#0d0d1a" stroke="#00ffff" stroke-width="2"/>
    
    <!-- Inner Armor Plating / Deck Structures -->
    <polygon points="-15,40 -20,10 -10,-15 0,-25 10,-15 20,10 15,40" fill="#1a1a2e" stroke="#222" stroke-width="1.5"/>
    <polygon points="-8,30 -12,15 0,0 12,15 8,30 0,35" fill="#111" stroke="#00ffff" stroke-width="1" opacity="0.8"/>
    
    <!-- Central Energy Conduit Core -->
    <line x1="0" y1="-20" x2="0" y2="40" stroke="#ff00ff" stroke-width="2" filter="url(#neonGlowMagenta)"/>
    <circle cx="0" cy="10" r="3" fill="#fff" filter="url(#neonGlowMagenta)"/>

    <!-- Cockpit / Command Bridge -->
    <polygon points="-15,-20 0,-40 15,-20 10,-5 -10,-5" fill="#000" stroke="#00ffff" stroke-width="1.5"/>
    <!-- Cockpit Window Glow -->
    <polygon points="-8,-15 0,-30 8,-15 0,-10" fill="#00ffff" filter="url(#neonGlowCyan)"/>
    <line x1="-4" y1="-18" x2="4" y2="-18" stroke="#fff" stroke-width="1"/>

    <!-- Forward Nose Cone / Sensors -->
    <path d="M -15,-30 L 0,-80 L 15,-30 L 5,-35 Z" fill="#050510" stroke="#00ffff" stroke-width="2" stroke-linejoin="round"/>
    <!-- Front Antenna / Laser -->
    <line x1="0" y1="-80" x2="0" y2="-100" stroke="#ff00ff" stroke-width="1.5" filter="url(#neonGlowMagenta)"/>
    <circle cx="0" cy="-100" r="1.5" fill="#fff" filter="drop-shadow(0 0 3px #ff00ff)"/>

    <!-- Left Wing / Swept Outrigger -->
    <path d="M -32,0 L -60,20 L -65,55 L -45,35 L -25,40 Z" fill="#111" stroke="#00ffff" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M -50,25 L -55,48 L -45,38" fill="none" stroke="#ff00ff" stroke-width="1.5" filter="url(#neonGlowMagenta)"/>
    <circle cx="-60" cy="50" r="2" fill="#ff00ff"/>
    
    <!-- Right Wing / Swept Outrigger -->
    <path d="M 32,0 L 60,20 L 65,55 L 45,35 L 25,40 Z" fill="#111" stroke="#00ffff" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M 50,25 L 55,48 L 45,38" fill="none" stroke="#ff00ff" stroke-width="1.5" filter="url(#neonGlowMagenta)"/>
    <circle cx="60" cy="50" r="2" fill="#ff00ff"/>
  </g>

  <text x="100" y="280" font-family="'Courier New', monospace" font-size="8" fill="#00ffff" text-anchor="middle" letter-spacing="4" opacity="0.6">Peer2Play</text>
</svg>
