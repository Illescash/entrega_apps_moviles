<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient for Copas (Red/Orange) -->
    <linearGradient id="bgGradCopa" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#140505"/>
      <stop offset="50%" stop-color="#2b0a0a"/>
      <stop offset="100%" stop-color="#100202"/>
    </linearGradient>

    <!-- Glowing Effects -->
    <filter id="neonGlowRed">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="neonGlowOrange">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Circuit Pattern for Background -->
    <pattern id="circuit" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 20 L 10 20 L 15 15 L 25 15 L 30 20 L 40 20 M 20 0 L 20 10 L 25 15 M 15 15 L 20 25 L 20 40" fill="none" stroke="#ff8800" stroke-width="0.5" stroke-opacity="0.15"/>
      <circle cx="10" cy="20" r="1" fill="#ff8800" fill-opacity="0.3"/>
      <circle cx="30" cy="20" r="1" fill="#ff8800" fill-opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Card Body -->
  <rect width="200" height="300" fill="url(#bgGradCopa)" rx="12" stroke="#444" stroke-width="1"/>
  <rect width="194" height="294" x="3" y="3" fill="url(#circuit)" rx="10"/>

  <!-- Cyberpunk Borders Copas -->
  <path d="M 12 12 L 40 12 M 160 12 L 188 12 M 188 12 L 188 40 M 188 260 L 188 288 M 188 288 L 160 288 M 40 288 L 12 288 M 12 288 L 12 260 M 12 40 L 12 12" fill="none" stroke="#ff8800" stroke-width="3" filter="url(#neonGlowOrange)"/>
  <path d="M 60 12 L 140 12 M 60 288 L 140 288 M 188 80 L 188 220 M 12 80 L 12 220" fill="none" stroke="#ff0055" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.8"/>

  <!-- Top-left Number -->
  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#fff" filter="url(#neonGlowOrange)">10</text>
  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#ff8800">10</text>

  <!-- Bottom-right Number -->
  <g transform="translate(178, 256) rotate(180)">
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#fff" filter="url(#neonGlowOrange)">10</text>
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#ff8800">10</text>
  </g>

  <!-- THE CYBER-ALCHEMIST (Sota de Copas) -->
  <g transform="translate(100, 148)">

    <!-- Mystic Aura / Ritual Circle behind the figure -->
    <ellipse cx="0" cy="10" rx="70" ry="90" fill="none" stroke="#ff0055" stroke-width="1" stroke-dasharray="3,12" opacity="0.25" filter="url(#neonGlowRed)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Cloak / Robe (Flowing, wide) -->
    <path d="M 0,-10 L -35,50 L -45,105 L 45,105 L 35,50 Z" fill="#0d0505" stroke="#ff0055" stroke-width="1.5"/>
    <!-- Inner cloak folds -->
    <path d="M 0,-10 L -20,50 L -25,105" fill="none" stroke="#ff8800" stroke-width="0.8" opacity="0.4"/>
    <path d="M 0,-10 L 20,50 L 25,105" fill="none" stroke="#ff8800" stroke-width="0.8" opacity="0.4"/>
    <!-- Central seam glow -->
    <line x1="0" y1="-5" x2="0" y2="105" stroke="#ff0055" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>

    <!-- Circuit tattoo patterns on cloak -->
    <path d="M -25,30 L -18,35 L -20,50 L -15,55" fill="none" stroke="#ff8800" stroke-width="0.8" opacity="0.35"/>
    <path d="M 25,30 L 18,35 L 20,50 L 15,55" fill="none" stroke="#ff8800" stroke-width="0.8" opacity="0.35"/>
    <circle cx="-18" cy="35" r="1.5" fill="#ff8800" opacity="0.5"/>
    <circle cx="18" cy="35" r="1.5" fill="#ff8800" opacity="0.5"/>

    <!-- Shoulders / Collar (High-tech mantle) -->
    <path d="M -30,-5 L -50,-20 L -35,-30 L 0,-15 L 35,-30 L 50,-20 L 30,-5" fill="#1a0808" stroke="#ff8800" stroke-width="2" stroke-linejoin="round"/>
    <path d="M -35,-18 C -15,-35 15,-35 35,-18" fill="none" stroke="#ff0055" stroke-width="1.5" filter="url(#neonGlowRed)"/>
    <!-- Shoulder nodes -->
    <circle cx="-42" cy="-18" r="2.5" fill="#ff0055" filter="url(#neonGlowRed)"/>
    <circle cx="42" cy="-18" r="2.5" fill="#ff0055" filter="url(#neonGlowRed)"/>

    <!-- Hood (Deep, shadowed) -->
    <path d="M -22,-15 Q -28,-50 -15,-65 Q 0,-78 15,-65 Q 28,-50 22,-15" fill="#0a0303" stroke="#ff0055" stroke-width="1.5"/>
    <!-- Hood inner shadow -->
    <path d="M -18,-18 Q -22,-42 -10,-55 Q 0,-62 10,-55 Q 22,-42 18,-18" fill="#050202" stroke="#ff8800" stroke-width="0.8" opacity="0.6"/>
    <!-- Hood top ridge -->
    <path d="M -15,-60 Q 0,-72 15,-60" fill="none" stroke="#ff8800" stroke-width="2" filter="url(#neonGlowOrange)"/>

    <!-- Glowing Visor (Inside the hood darkness) -->
    <line x1="-12" y1="-38" x2="12" y2="-38" stroke="#ff0055" stroke-width="3" filter="url(#neonGlowRed)"/>
    <line x1="-10" y1="-38" x2="10" y2="-38" stroke="#fff" stroke-width="1.5"/>
    <!-- Visor scan line -->
    <line x1="-8" y1="-34" x2="8" y2="-34" stroke="#ff8800" stroke-width="0.8" opacity="0.6"/>

    <!-- Left Arm (Channeling energy into chalice) -->
    <path d="M -30,-5 Q -45,15 -35,35 Q -28,48 -15,42" fill="none" stroke="#1a0808" stroke-width="7" stroke-linecap="round"/>
    <path d="M -30,-5 Q -45,15 -35,35 Q -28,48 -15,42" fill="none" stroke="#ff0055" stroke-width="2" stroke-linecap="round"/>
    <!-- Left hand energy sparks -->
    <circle cx="-16" cy="40" r="2" fill="#ff8800" filter="url(#neonGlowOrange)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.2s" repeatCount="indefinite"/>
    </circle>

    <!-- Right Arm (Channeling energy into chalice) -->
    <path d="M 30,-5 Q 45,15 35,35 Q 28,48 15,42" fill="none" stroke="#1a0808" stroke-width="7" stroke-linecap="round"/>
    <path d="M 30,-5 Q 45,15 35,35 Q 28,48 15,42" fill="none" stroke="#ff8800" stroke-width="2" stroke-linecap="round"/>
    <!-- Right hand energy sparks -->
    <circle cx="16" cy="40" r="2" fill="#ff0055" filter="url(#neonGlowRed)">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.2s" repeatCount="indefinite"/>
    </circle>

    <!-- Energy streams from hands into chalice -->
    <path d="M -14,40 Q -8,48 -4,52" fill="none" stroke="#ff0055" stroke-width="1.5" stroke-dasharray="3,3" filter="url(#neonGlowRed)">
      <animate attributeName="stroke-dashoffset" from="0" to="-12" dur="0.8s" repeatCount="indefinite"/>
    </path>
    <path d="M 14,40 Q 8,48 4,52" fill="none" stroke="#ff8800" stroke-width="1.5" stroke-dasharray="3,3" filter="url(#neonGlowOrange)">
      <animate attributeName="stroke-dashoffset" from="0" to="-12" dur="0.8s" repeatCount="indefinite"/>
    </path>

    <!-- THE CHALICE (Central, larger, the alchemist's creation) -->
    <g transform="translate(0, 68)">
      <!-- Base -->
      <polygon points="-28,40 28,40 20,30 -20,30" fill="#1a0d0d" stroke="#ff0055" stroke-width="1.5"/>
      <path d="M -18,35 L 18,35" stroke="#ff8800" stroke-width="0.5" opacity="0.5"/>
      <!-- Stem -->
      <path d="M -7,0 L -5,30 L 5,30 L 7,0 Z" fill="#0d0505" stroke="#ff8800" stroke-width="1.2"/>
      <line x1="0" y1="5" x2="0" y2="25" stroke="#ff0055" stroke-width="2" filter="url(#neonGlowRed)"/>
      <!-- Outer Bowl -->
      <path d="M -38,-18 Q -35,0 0,0 Q 35,0 38,-18 Z" fill="#1a0a0a" stroke="#ff0055" stroke-width="2" filter="url(#neonGlowRed)"/>
      <!-- Inner Bowl -->
      <path d="M -32,-22 Q -28,-2 0,-2 Q 28,-2 32,-22 Z" fill="#2b0d0d" stroke="#ff8800" stroke-width="1" opacity="0.8"/>
      <!-- Bubbling Liquid -->
      <path d="M -28,-18 Q -20,-5 0,-5 Q 20,-5 28,-18 Z" fill="#ff4400" opacity="0.5" filter="url(#neonGlowOrange)"/>
      <!-- Liquid bubbles -->
      <circle cx="-8" cy="-12" r="2" fill="#fff" opacity="0.6">
        <animate attributeName="cy" values="-10;-18;-10" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="5" cy="-14" r="1.5" fill="#fff" opacity="0.4">
        <animate attributeName="cy" values="-12;-22;-12" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;0;0.4" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-2" cy="-8" r="1" fill="#ff8800" opacity="0.8">
        <animate attributeName="cy" values="-8;-20;-8" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0;0.8" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <!-- Rim Glow -->
      <ellipse cx="0" cy="-20" rx="32" ry="6" fill="none" stroke="#fff" stroke-width="1.5" filter="url(#neonGlowOrange)"/>
    </g>

    <!-- Holographic vapour / data rising from chalice -->
    <g opacity="0.7" transform="translate(0, 30)">
      <!-- Rising data particles -->
      <rect x="-1" y="0" width="2" height="2" fill="#ff8800" opacity="0.6">
        <animate attributeName="y" values="0;-35" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0" dur="2.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="6" y="5" width="1.5" height="1.5" fill="#fff" opacity="0.5">
        <animate attributeName="y" values="5;-30" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0" dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect x="-8" y="3" width="1.5" height="1.5" fill="#ff0055" opacity="0.5">
        <animate attributeName="y" values="3;-28" dur="1.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0" dur="1.8s" repeatCount="indefinite"/>
      </rect>
      <rect x="3" y="8" width="1" height="1" fill="#fff" opacity="0.4">
        <animate attributeName="y" values="8;-25" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0" dur="3s" repeatCount="indefinite"/>
      </rect>
      <rect x="-4" y="6" width="1" height="1" fill="#ff8800" opacity="0.4">
        <animate attributeName="y" values="6;-32" dur="2.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0" dur="2.2s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Floating Star above the chalice (the alchemist's creation emerging) -->
    <g transform="translate(0, -80)">
      <animateTransform attributeName="transform" type="translate" values="0,-82; 0,-78; 0,-82" dur="3s" repeatCount="indefinite"/>
      <circle r="10" fill="#ff0055" opacity="0.1" filter="url(#neonGlowRed)">
        <animate attributeName="r" values="8;13;8" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.1;0.3;0.1" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle r="16" fill="none" stroke="#ff8800" stroke-width="0.5" stroke-dasharray="4,10" opacity="0.5">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
      </circle>
      <polygon points="0,-12 3.5,-3.5 12,0 3.5,3.5 0,12 -3.5,3.5 -12,0 -3.5,-3.5" fill="#fff" filter="drop-shadow(0 0 8px #fff)"/>
      <circle r="3.5" fill="#fff" filter="url(#neonGlowOrange)">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="0.8s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Projection lines from chalice rim to floating star -->
    <line x1="-15" y1="42" x2="-8" y2="-72" stroke="#ff8800" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.4"/>
    <line x1="15" y1="42" x2="8" y2="-72" stroke="#ff8800" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.4"/>
  </g>

  <!-- Holographic overlay text -->
  <text x="100" y="280" font-family="'Courier New', monospace" font-size="8" fill="#ff8800" text-anchor="middle" letter-spacing="4" opacity="0.6">Peer2Play</text>
</svg>
