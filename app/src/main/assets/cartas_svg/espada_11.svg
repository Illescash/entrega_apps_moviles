<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050a14"/>
      <stop offset="50%" stop-color="#0a152b"/>
      <stop offset="100%" stop-color="#020510"/>
    </linearGradient>
    <filter id="neonGlowBlue">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonGlowCyan">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="circuit" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 20 L 10 20 L 15 15 L 25 15 L 30 20 L 40 20 M 20 0 L 20 10 L 25 15 M 15 15 L 20 25 L 20 40" fill="none" stroke="#00ffff" stroke-width="0.5" stroke-opacity="0.15"/>
    </pattern>
  </defs>

  <rect width="200" height="300" fill="url(#bgGrad)" rx="12" stroke="#444" stroke-width="1"/>
  <rect width="194" height="294" x="3" y="3" fill="url(#circuit)" rx="10"/>
  <path d="M 12 12 L 40 12 M 160 12 L 188 12 M 188 12 L 188 40 M 188 260 L 188 288 M 188 288 L 160 288 M 40 288 L 12 288 M 12 288 L 12 260 M 12 40 L 12 12" fill="none" stroke="#00ffff" stroke-width="3" filter="url(#neonGlowCyan)"/>
  <path d="M 60 12 L 140 12 M 60 288 L 140 288 M 188 80 L 188 220 M 12 80 L 12 220" fill="none" stroke="#0088ff" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.8"/>

  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#fff" filter="url(#neonGlowCyan)">11</text>
  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#00ffff">11</text>
  <g transform="translate(178, 256) rotate(180)">
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#fff" filter="url(#neonGlowCyan)">11</text>
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#00ffff">11</text>
  </g>

  <!-- EL SANTO DE LAS ESPADAS -->
  <g transform="translate(100, 155)">

    <!-- === OUTER ENERGY MANDALA (slow rotation) === -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="40s" repeatCount="indefinite"/>
      <circle cx="0" cy="0" r="88" fill="none" stroke="#0088ff" stroke-width="0.5" stroke-dasharray="2,12" opacity="0.2"/>
    </g>

    <!-- === SWORD MANDALA (8 swords in a ring, slow counter-rotation) === -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="50s" repeatCount="indefinite"/>

      <!-- Sword at 0° (top) -->
      <g transform="rotate(0) translate(0, -75)">
        <polygon points="-3,12 3,12 1.5,-18 0,-24 -1.5,-18" fill="#0a152b" stroke="#00ffff" stroke-width="1" filter="url(#neonGlowCyan)"/>
        <polygon points="-1,12 1,12 0.5,-16 0,-21 -0.5,-16" fill="#ccf0ff" opacity="0.7"/>
        <polygon points="-5,12 5,12 4,14 -4,14" fill="#0d0d20" stroke="#0088ff" stroke-width="0.6"/>
        <rect x="-1.5" y="14" width="3" height="7" fill="#050a14" stroke="#0088ff" stroke-width="0.5"/>
      </g>
      <!-- Sword at 45° -->
      <g transform="rotate(45) translate(0, -75)">
        <polygon points="-3,12 3,12 1.5,-18 0,-24 -1.5,-18" fill="#0a152b" stroke="#00ffff" stroke-width="1" filter="url(#neonGlowCyan)"/>
        <polygon points="-1,12 1,12 0.5,-16 0,-21 -0.5,-16" fill="#ccf0ff" opacity="0.7"/>
        <polygon points="-5,12 5,12 4,14 -4,14" fill="#0d0d20" stroke="#0088ff" stroke-width="0.6"/>
        <rect x="-1.5" y="14" width="3" height="7" fill="#050a14" stroke="#0088ff" stroke-width="0.5"/>
      </g>
      <!-- Sword at 90° -->
      <g transform="rotate(90) translate(0, -75)">
        <polygon points="-3,12 3,12 1.5,-18 0,-24 -1.5,-18" fill="#0a152b" stroke="#00ffff" stroke-width="1" filter="url(#neonGlowCyan)"/>
        <polygon points="-1,12 1,12 0.5,-16 0,-21 -0.5,-16" fill="#ccf0ff" opacity="0.7"/>
        <polygon points="-5,12 5,12 4,14 -4,14" fill="#0d0d20" stroke="#0088ff" stroke-width="0.6"/>
        <rect x="-1.5" y="14" width="3" height="7" fill="#050a14" stroke="#0088ff" stroke-width="0.5"/>
      </g>
      <!-- Sword at 135° -->
      <g transform="rotate(135) translate(0, -75)">
        <polygon points="-3,12 3,12 1.5,-18 0,-24 -1.5,-18" fill="#0a152b" stroke="#00ffff" stroke-width="1" filter="url(#neonGlowCyan)"/>
        <polygon points="-1,12 1,12 0.5,-16 0,-21 -0.5,-16" fill="#ccf0ff" opacity="0.7"/>
        <polygon points="-5,12 5,12 4,14 -4,14" fill="#0d0d20" stroke="#0088ff" stroke-width="0.6"/>
        <rect x="-1.5" y="14" width="3" height="7" fill="#050a14" stroke="#0088ff" stroke-width="0.5"/>
      </g>
      <!-- Sword at 180° -->
      <g transform="rotate(180) translate(0, -75)">
        <polygon points="-3,12 3,12 1.5,-18 0,-24 -1.5,-18" fill="#0a152b" stroke="#00ffff" stroke-width="1" filter="url(#neonGlowCyan)"/>
        <polygon points="-1,12 1,12 0.5,-16 0,-21 -0.5,-16" fill="#ccf0ff" opacity="0.7"/>
        <polygon points="-5,12 5,12 4,14 -4,14" fill="#0d0d20" stroke="#0088ff" stroke-width="0.6"/>
        <rect x="-1.5" y="14" width="3" height="7" fill="#050a14" stroke="#0088ff" stroke-width="0.5"/>
      </g>
      <!-- Sword at 225° -->
      <g transform="rotate(225) translate(0, -75)">
        <polygon points="-3,12 3,12 1.5,-18 0,-24 -1.5,-18" fill="#0a152b" stroke="#00ffff" stroke-width="1" filter="url(#neonGlowCyan)"/>
        <polygon points="-1,12 1,12 0.5,-16 0,-21 -0.5,-16" fill="#ccf0ff" opacity="0.7"/>
        <polygon points="-5,12 5,12 4,14 -4,14" fill="#0d0d20" stroke="#0088ff" stroke-width="0.6"/>
        <rect x="-1.5" y="14" width="3" height="7" fill="#050a14" stroke="#0088ff" stroke-width="0.5"/>
      </g>
      <!-- Sword at 270° -->
      <g transform="rotate(270) translate(0, -75)">
        <polygon points="-3,12 3,12 1.5,-18 0,-24 -1.5,-18" fill="#0a152b" stroke="#00ffff" stroke-width="1" filter="url(#neonGlowCyan)"/>
        <polygon points="-1,12 1,12 0.5,-16 0,-21 -0.5,-16" fill="#ccf0ff" opacity="0.7"/>
        <polygon points="-5,12 5,12 4,14 -4,14" fill="#0d0d20" stroke="#0088ff" stroke-width="0.6"/>
        <rect x="-1.5" y="14" width="3" height="7" fill="#050a14" stroke="#0088ff" stroke-width="0.5"/>
      </g>
      <!-- Sword at 315° -->
      <g transform="rotate(315) translate(0, -75)">
        <polygon points="-3,12 3,12 1.5,-18 0,-24 -1.5,-18" fill="#0a152b" stroke="#00ffff" stroke-width="1" filter="url(#neonGlowCyan)"/>
        <polygon points="-1,12 1,12 0.5,-16 0,-21 -0.5,-16" fill="#ccf0ff" opacity="0.7"/>
        <polygon points="-5,12 5,12 4,14 -4,14" fill="#0d0d20" stroke="#0088ff" stroke-width="0.6"/>
        <rect x="-1.5" y="14" width="3" height="7" fill="#050a14" stroke="#0088ff" stroke-width="0.5"/>
      </g>

      <!-- Energy threads connecting swords to center -->
      <g stroke="#0088ff" stroke-width="0.4" stroke-dasharray="2,4" opacity="0.25">
        <line x1="0" y1="0" x2="0" y2="-63"/>
        <line x1="0" y1="0" x2="44.5" y2="-44.5"/>
        <line x1="0" y1="0" x2="63" y2="0"/>
        <line x1="0" y1="0" x2="44.5" y2="44.5"/>
        <line x1="0" y1="0" x2="0" y2="63"/>
        <line x1="0" y1="0" x2="-44.5" y2="44.5"/>
        <line x1="0" y1="0" x2="-63" y2="0"/>
        <line x1="0" y1="0" x2="-44.5" y2="-44.5"/>
      </g>
    </g>

    <!-- === INNER ENERGY RINGS === -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="#00ffff" stroke-width="1" stroke-dasharray="5,15" opacity="0.15" filter="url(#neonGlowCyan)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#0088ff" stroke-width="0.8" stroke-dasharray="3,10" opacity="0.2">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s" repeatCount="indefinite"/>
    </circle>

    <!-- === THE FIGURE (floating, battle-scarred war monk) === -->
    <g>
      <!-- Levitation bob -->
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="4s" repeatCount="indefinite"/>

      <!-- Unstable telekinetic aura (aggressive, flickering) -->
      <ellipse cx="0" cy="5" rx="28" ry="35" fill="#00ccff" opacity="0.04" filter="url(#neonGlowCyan)">
        <animate attributeName="opacity" values="0.02;0.08;0.02;0.06;0.02" dur="2s" repeatCount="indefinite"/>
      </ellipse>

      <!-- Legs (crossed, lotus position, heavy armored) -->
      <path d="M -15,20 Q -8,32 5,30 Q 15,28 22,18" fill="none" stroke="#050a14" stroke-width="10" stroke-linecap="round"/>
      <path d="M -15,20 Q -8,32 5,30 Q 15,28 22,18" fill="none" stroke="#0088ff" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 15,20 Q 8,34 -5,32 Q -15,30 -22,22" fill="none" stroke="#050a14" stroke-width="10" stroke-linecap="round"/>
      <path d="M 15,20 Q 8,34 -5,32 Q -15,30 -22,22" fill="none" stroke="#00ffff" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Knee armor plates -->
      <circle cx="-8" cy="28" r="3" fill="#0a0a1e" stroke="#0088ff" stroke-width="1"/>
      <circle cx="8" cy="28" r="3" fill="#0a0a1e" stroke="#00ffff" stroke-width="1"/>

      <!-- Torso (heavy, battle-worn) -->
      <polygon points="-18,22 18,22 16,-14 6,-30 -6,-30 -16,-14" fill="#050a14" stroke="#00ffff" stroke-width="2"/>
      <!-- Heavy chest plates -->
      <path d="M -12,-10 L 0,2 L 12,-10" fill="none" stroke="#0088ff" stroke-width="2" filter="url(#neonGlowBlue)"/>
      <path d="M -10,-2 L 0,6 L 10,-2" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.5"/>
      <line x1="0" y1="6" x2="0" y2="18" stroke="#00ffff" stroke-width="1" opacity="0.4"/>
      <!-- Battle scar across chest (diagonal slash mark) -->
      <line x1="-14" y1="-8" x2="10" y2="12" stroke="#00ccff" stroke-width="1.5" opacity="0.4"/>
      <line x1="-13" y1="-6" x2="11" y2="14" stroke="#fff" stroke-width="0.3" opacity="0.3"/>
      <!-- Core energy (contained fury, pulsing harder) -->
      <circle cx="0" cy="-4" r="4" fill="#020510" stroke="#00ffff" stroke-width="1.5"/>
      <circle cx="0" cy="-4" r="2" fill="#00ffff" filter="url(#neonGlowCyan)">
        <animate attributeName="r" values="1.5;3;1.5" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite"/>
      </circle>

      <!-- MASSIVE shoulder plates (warrior, not monk) -->
      <path d="M -16,-14 L -30,-22 L -26,-30 L -6,-20" fill="#0a0a1e" stroke="#00ffff" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M 16,-14 L 30,-22 L 26,-30 L 6,-20" fill="#0a0a1e" stroke="#0088ff" stroke-width="1.5" stroke-linejoin="round"/>
      <!-- Shoulder spikes -->
      <path d="M -28,-24 L -34,-32 L -27,-28" fill="#00ffff" opacity="0.6" filter="url(#neonGlowCyan)"/>
      <path d="M 28,-24 L 34,-32 L 27,-28" fill="#0088ff" opacity="0.6" filter="url(#neonGlowBlue)"/>
      <!-- Shoulder glow nodes -->
      <circle cx="-28" cy="-24" r="2" fill="#00ffff" filter="url(#neonGlowCyan)">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="28" cy="-24" r="2" fill="#0088ff" filter="url(#neonGlowBlue)">
        <animate attributeName="opacity" values="1;0.5;1" dur="1.8s" repeatCount="indefinite"/>
      </circle>

      <!-- Arms (crossed over chest, fists clenched — restrained power) -->
      <!-- Left arm crosses to right -->
      <path d="M -16,-14 Q -20,0 -8,12 Q 2,18 12,10" fill="none" stroke="#050a14" stroke-width="7" stroke-linecap="round"/>
      <path d="M -16,-14 Q -20,0 -8,12 Q 2,18 12,10" fill="none" stroke="#0088ff" stroke-width="2" stroke-linecap="round"/>
      <!-- Right arm crosses to left -->
      <path d="M 16,-14 Q 20,0 8,12 Q -2,18 -12,10" fill="none" stroke="#050a14" stroke-width="7" stroke-linecap="round"/>
      <path d="M 16,-14 Q 20,0 8,12 Q -2,18 -12,10" fill="none" stroke="#00ffff" stroke-width="2" stroke-linecap="round"/>
      <!-- Clenched fists (gauntlets) -->
      <circle cx="14" cy="10" r="4" fill="#050a14" stroke="#0088ff" stroke-width="1.5"/>
      <circle cx="-14" cy="10" r="4" fill="#050a14" stroke="#00ffff" stroke-width="1.5"/>

      <!-- Head (heavy battle helm with damage) -->
      <polygon points="-12,-32 12,-32 14,-45 9,-58 -9,-58 -14,-45" fill="#050a14" stroke="#00ffff" stroke-width="2"/>
      <!-- Helm ridge / mohawk crest -->
      <path d="M 0,-58 L -2,-68 L 0,-72 L 2,-68 Z" fill="#0088ff" filter="url(#neonGlowBlue)"/>
      <path d="M -6,-58 L -5,-64" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.5"/>
      <path d="M 6,-58 L 5,-64" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.5"/>
      <!-- Battle scar across helm (deep gouge) -->
      <line x1="-10" y1="-50" x2="6" y2="-38" stroke="#00ccff" stroke-width="1.5" opacity="0.5"/>
      <line x1="-9" y1="-49" x2="7" y2="-37" stroke="#fff" stroke-width="0.3" opacity="0.3"/>
      <!-- Visor — aggressive V-shape, eyes OPEN and glowing hard -->
      <line x1="-10" y1="-44" x2="-2" y2="-40" stroke="#00ffff" stroke-width="2.5" filter="url(#neonGlowCyan)"/>
      <line x1="10" y1="-44" x2="2" y2="-40" stroke="#00ffff" stroke-width="2.5" filter="url(#neonGlowCyan)"/>
      <line x1="-8" y1="-44" x2="-2" y2="-41" stroke="#fff" stroke-width="1"/>
      <line x1="8" y1="-44" x2="2" y2="-41" stroke="#fff" stroke-width="1"/>
      <!-- Jaw guard / breath vents -->
      <line x1="-5" y1="-35" x2="5" y2="-35" stroke="#fff" stroke-width="1"/>
      <line x1="-4" y1="-33" x2="4" y2="-33" stroke="#fff" stroke-width="0.8" opacity="0.6"/>
      <line x1="-3" y1="-31" x2="3" y2="-31" stroke="#fff" stroke-width="0.6" opacity="0.4"/>
      <!-- Forehead control nexus (larger, angrier) -->
      <polygon points="0,-55 3,-52 0,-49 -3,-52" fill="#020510" stroke="#00ffff" stroke-width="1"/>
      <circle cx="0" cy="-52" r="1.5" fill="#00ffff" filter="url(#neonGlowCyan)">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.2s" repeatCount="indefinite"/>
      </circle>

      <!-- Cables from helm (tense, angular, not flowing) -->
      <path d="M -9,-58 L -15,-65 L -12,-72" fill="none" stroke="#0088ff" stroke-width="2" stroke-linecap="round"/>
      <path d="M 9,-58 L 15,-65 L 12,-72" fill="none" stroke="#0088ff" stroke-width="2" stroke-linecap="round"/>
      <path d="M -5,-58 L -8,-68 L -10,-75" fill="none" stroke="#00ffff" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M 5,-58 L 8,-68 L 10,-75" fill="none" stroke="#00ffff" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Cable end sparks -->
      <circle cx="-12" cy="-72" r="1.5" fill="#00ffff" filter="url(#neonGlowCyan)" opacity="0.7">
        <animate attributeName="opacity" values="0.4;0.9;0.4" dur="0.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="12" cy="-72" r="1.5" fill="#00ffff" filter="url(#neonGlowCyan)" opacity="0.7">
        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="0.8s" repeatCount="indefinite"/>
      </circle>

      <!-- Energy crackling around the figure (restrained fury) -->
      <line x1="-20" y1="-5" x2="-26" y2="-10" stroke="#00ffff" stroke-width="0.8" opacity="0.4">
        <animate attributeName="opacity" values="0;0.6;0" dur="1.5s" repeatCount="indefinite"/>
      </line>
      <line x1="20" y1="5" x2="26" y2="0" stroke="#00ffff" stroke-width="0.8" opacity="0.4">
        <animate attributeName="opacity" values="0.5;0;0.5" dur="1.2s" repeatCount="indefinite"/>
      </line>
      <line x1="-18" y1="15" x2="-24" y2="18" stroke="#0088ff" stroke-width="0.8" opacity="0.3">
        <animate attributeName="opacity" values="0;0.5;0" dur="1.8s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- Levitation shadow on ground -->
    <ellipse cx="0" cy="44" rx="22" ry="3" fill="#00ffff" opacity="0.06" filter="url(#neonGlowCyan)">
      <animate attributeName="rx" values="20;24;20" dur="4s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <text x="100" y="280" font-family="'Courier New', monospace" font-size="8" fill="#00ffff" text-anchor="middle" letter-spacing="4" opacity="0.6">Peer2Play</text>
</svg>
