<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient for Copas (Red/Orange) -->
    <linearGradient id="bgGradCopa" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#140505"/>
      <stop offset="50%" stop-color="#2b0a0a"/>
      <stop offset="100%" stop-color="#100202"/>
    </linearGradient>

    <!-- Glowing Effects -->
    <filter id="neonGlowRed">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="6" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="neonGlowOrange">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="6" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Circuit Pattern for Background -->
    <pattern id="circuit" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 20 L 10 20 L 15 15 L 25 15 L 30 20 L 40 20 M 20 0 L 20 10 L 25 15 M 15 15 L 20 25 L 20 40" fill="none" stroke="#ff8800" stroke-width="0.5" stroke-opacity="0.15"/>
      <circle cx="10" cy="20" r="1" fill="#ff8800" fill-opacity="0.3"/>
      <circle cx="30" cy="20" r="1" fill="#ff8800" fill-opacity="0.3"/>
    </pattern>

    <!-- Reusable Cyber-Chalice -->
    <g id="chaliceBase">
       <polygon points="-16,40 16,40 12,34 -12,34" fill="#1a0d0d" stroke="#ff0055" stroke-width="1"/>
       <path d="M -4,12 L -2.5,34 L 2.5,34 L 4,12 Z" fill="#0d0505" stroke="#ff8800" stroke-width="1"/>
       <line x1="0" y1="15" x2="0" y2="30" stroke="#ff0055" stroke-width="1.2" filter="url(#neonGlowRed)"/>
       <path d="M -22,-6 Q -20,10 0,10 Q 20,10 22,-6 Z" fill="#1a0a0a" stroke="#ff0055" stroke-width="1.2" filter="url(#neonGlowRed)"/>
       <path d="M -18,-8 Q -16,8 0,8 Q 16,8 18,-8 Z" fill="#2b0d0d" stroke="#ff8800" stroke-width="0.6" opacity="0.8"/>
       <path d="M -15,-6 Q -12,2 0,2 Q 12,2 15,-6 Z" fill="#ff4400" opacity="0.4" filter="url(#neonGlowOrange)"/>
       <ellipse cx="0" cy="-8" rx="18" ry="2.5" fill="none" stroke="#fff" stroke-width="0.8" filter="url(#neonGlowOrange)"/>
    </g>

    <!-- Floating Data Star -->
    <g id="floatingStar">
      <animateTransform attributeName="transform" type="translate" values="0,-2; 0,2; 0,-2" dur="3s" repeatCount="indefinite" additive="sum"/>
      <circle r="12" fill="#ff0055" opacity="0.1" filter="url(#neonGlowRed)">
        <animate attributeName="r" values="9;14;9" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.1;0.3;0.1" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle r="17" fill="none" stroke="#ff8800" stroke-width="0.5" stroke-dasharray="4,10" opacity="0.5">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
      </circle>
      <polygon points="0,-14 4,-4 14,0 4,4 0,14 -4,4 -14,0 -4,-4" fill="#fff" filter="drop-shadow(0 0 8px #fff)"/>
      <circle r="4" fill="#fff" filter="url(#neonGlowOrange)">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="0.8s" repeatCount="indefinite"/>
      </circle>
    </g>
  </defs>

  <rect width="200" height="300" fill="url(#bgGradCopa)" rx="12" stroke="#444" stroke-width="1"/>
  <rect width="194" height="294" x="3" y="3" fill="url(#circuit)" rx="10"/>

  <path d="M 12 12 L 40 12 M 160 12 L 188 12 M 188 12 L 188 40 M 188 260 L 188 288 M 188 288 L 160 288 M 40 288 L 12 288 M 12 288 L 12 260 M 12 40 L 12 12" fill="none" stroke="#ff8800" stroke-width="3" filter="url(#neonGlowOrange)"/>

  <!-- Numbers -->
  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#fff" filter="url(#neonGlowOrange)">6</text>
  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#ff8800">6</text>
  <g transform="translate(178, 256) rotate(180)">
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#fff" filter="url(#neonGlowOrange)">6</text>
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#ff8800">6</text>
  </g>

  <!-- Six Copas (2 columns of 3) -->
  <use href="#chaliceBase" x="65" y="70"/>
  <use href="#chaliceBase" x="135" y="70"/>
  <use href="#chaliceBase" x="65" y="150"/>
  <use href="#chaliceBase" x="135" y="150"/>
  <use href="#chaliceBase" x="65" y="230"/>
  <use href="#chaliceBase" x="135" y="230"/>

  <!-- Floating Stars (one per copa) -->
  <g transform="translate(65, 42) scale(0.4)"><use href="#floatingStar"/></g>
  <g transform="translate(135, 42) scale(0.4)"><use href="#floatingStar"/></g>
  <g transform="translate(65, 122) scale(0.4)"><use href="#floatingStar"/></g>
  <g transform="translate(135, 122) scale(0.4)"><use href="#floatingStar"/></g>
  <g transform="translate(65, 202) scale(0.4)"><use href="#floatingStar"/></g>
  <g transform="translate(135, 202) scale(0.4)"><use href="#floatingStar"/></g>

  <!-- Holographic overlay text -->
  <text x="100" y="280" font-family="'Courier New', monospace" font-size="8" fill="#ff8800" text-anchor="middle" letter-spacing="4" opacity="0.6">Peer2Play</text>
</svg>
