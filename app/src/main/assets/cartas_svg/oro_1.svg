<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="50%" stop-color="#12122b"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>

    <!-- Glowing Effects -->
    <filter id="neonGlowCyan">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="neonGlowMagenta">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Coin Metallic Gradient -->
    <linearGradient id="goldGradient" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#fffb00"/>
      <stop offset="30%" stop-color="#ffcc00"/>
      <stop offset="70%" stop-color="#ff9900"/>
      <stop offset="100%" stop-color="#cc6600"/>
    </linearGradient>

    <!-- Circuit Pattern for Background -->
    <pattern id="circuit" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 20 L 10 20 L 15 15 L 25 15 L 30 20 L 40 20 M 20 0 L 20 10 L 25 15 M 15 15 L 20 25 L 20 40" fill="none" stroke="#00ffff" stroke-width="0.5" stroke-opacity="0.15"/>
      <circle cx="10" cy="20" r="1" fill="#00ffff" fill-opacity="0.3"/>
      <circle cx="30" cy="20" r="1" fill="#00ffff" fill-opacity="0.3"/>
      <circle cx="20" cy="10" r="1" fill="#00ffff" fill-opacity="0.3"/>
      <circle cx="20" cy="25" r="1" fill="#00ffff" fill-opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Card Body -->
  <rect width="200" height="300" fill="url(#bgGrad)" rx="12" stroke="#444" stroke-width="1"/>
  <rect width="194" height="294" x="3" y="3" fill="url(#circuit)" rx="10"/>

  <!-- Cyberpunk Borders -->
  <path d="M 12 12 L 40 12 M 160 12 L 188 12 M 188 12 L 188 40 M 188 260 L 188 288 M 188 288 L 160 288 M 40 288 L 12 288 M 12 288 L 12 260 M 12 40 L 12 12" fill="none" stroke="#00ffff" stroke-width="3" filter="url(#neonGlowCyan)"/>
  
  <path d="M 60 12 L 140 12 M 60 288 L 140 288 M 188 80 L 188 220 M 12 80 L 12 220" fill="none" stroke="#ff00ff" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.8"/>

  <!-- Top-left Number -->
  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#fff" filter="url(#neonGlowMagenta)">1</text>
  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#ff00ff">1</text>

  <!-- Bottom-right Number (Inverted) -->
  <g transform="translate(178, 256) rotate(180)">
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#fff" filter="url(#neonGlowMagenta)">1</text>
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#ff00ff">1</text>
  </g>

  <!-- Central "Oro" (Gold Coin / Core) -->
  <g transform="translate(100, 150)">
    <!-- Outer energy ring -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#00ffff" stroke-width="2" stroke-dasharray="5,10" filter="url(#neonGlowCyan)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="0" cy="0" r="54" fill="none" stroke="#ff00ff" stroke-width="1" stroke-dasharray="20,5" filter="url(#neonGlowMagenta)">
       <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s" repeatCount="indefinite"/>
    </circle>

    <!-- Metallic Base -->
    <circle cx="0" cy="0" r="45" fill="#1a1a1a" stroke="#333" stroke-width="4"/>
    <circle cx="0" cy="0" r="41" fill="url(#goldGradient)" filter="drop-shadow(0 0 10px #ffcc00)"/>

    <!-- Inner Core Details -->
    <circle cx="0" cy="0" r="32" fill="none" stroke="#fff" stroke-width="1" stroke-opacity="0.3"/>
    
    <!-- Central Icon (Polygon Star) -->
    <polygon points="0,-18 5,-5 18,0 5,5 0,18 -5,5 -18,0 -5,-5" fill="#fff" filter="drop-shadow(0 0 5px #fff)"/>
    <circle cx="0" cy="0" r="6" fill="#00ffff" filter="url(#neonGlowCyan)"/>

    <!-- Tech details -->
    <rect x="-2" y="-41" width="4" height="6" fill="#1a1a1a"/>
    <rect x="-2" y="35" width="4" height="6" fill="#1a1a1a"/>
    <rect x="-41" y="-2" width="6" height="4" fill="#1a1a1a"/>
    <rect x="35" y="-2" width="6" height="4" fill="#1a1a1a"/>
  </g>
  
  <!-- Holographic overlay text -->
  <text x="100" y="275" font-family="'Courier New', monospace" font-size="8" fill="#00ffff" text-anchor="middle" letter-spacing="4" opacity="0.6">Peer2Play</text>
</svg>
