<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050a14"/>
      <stop offset="50%" stop-color="#0a152b"/>
      <stop offset="100%" stop-color="#020510"/>
    </linearGradient>
    <filter id="neonGlowBlue">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonGlowCyan">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="circuit" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 20 L 10 20 L 15 15 L 25 15 L 30 20 L 40 20 M 20 0 L 20 10 L 25 15 M 15 15 L 20 25 L 20 40" fill="none" stroke="#00ffff" stroke-width="0.5" stroke-opacity="0.15"/>
    </pattern>
  </defs>

  <rect width="200" height="300" fill="url(#bgGrad)" rx="12" stroke="#444" stroke-width="1"/>
  <rect width="194" height="294" x="3" y="3" fill="url(#circuit)" rx="10"/>
  <path d="M 12 12 L 40 12 M 160 12 L 188 12 M 188 12 L 188 40 M 188 260 L 188 288 M 188 288 L 160 288 M 40 288 L 12 288 M 12 288 L 12 260 M 12 40 L 12 12" fill="none" stroke="#00ffff" stroke-width="3" filter="url(#neonGlowCyan)"/>
  <path d="M 60 12 L 140 12 M 60 288 L 140 288 M 188 80 L 188 220 M 12 80 L 12 220" fill="none" stroke="#0088ff" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.8"/>

  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#fff" filter="url(#neonGlowCyan)">10</text>
  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#00ffff">10</text>
  <g transform="translate(178, 256) rotate(180)">
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#fff" filter="url(#neonGlowCyan)">10</text>
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#00ffff">10</text>
  </g>

  <!-- CYBER-RONIN (v2, scaled up) -->
  <g transform="translate(100, 150) scale(1.15) translate(0, -5)">

    <!-- Wind data particles blowing past -->
    <g opacity="0.5">
      <rect x="40" y="-30" width="3" height="1" fill="#00ffff">
        <animate attributeName="x" values="55;-65" dur="1.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.7;0" dur="1.8s" repeatCount="indefinite"/>
      </rect>
      <rect x="55" y="10" width="4" height="1" fill="#0088ff">
        <animate attributeName="x" values="65;-55" dur="2.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.5;0" dur="2.2s" repeatCount="indefinite"/>
      </rect>
      <rect x="45" y="-55" width="2.5" height="1" fill="#fff">
        <animate attributeName="x" values="60;-60" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.6;0" dur="1.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="50" y="40" width="3" height="1" fill="#00ffff">
        <animate attributeName="x" values="60;-65" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.4;0" dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect x="48" y="-10" width="2" height="1" fill="#0088ff">
        <animate attributeName="x" values="58;-58" dur="1.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.5;0" dur="1.6s" repeatCount="indefinite"/>
      </rect>
      <rect x="42" y="60" width="3.5" height="1" fill="#00ffff">
        <animate attributeName="x" values="52;-55" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0.3;0" dur="2.4s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Tattered data-scarf blowing in the wind -->
    <path d="M 5,-38 Q 28,-32 45,-42 Q 60,-50 72,-40" fill="none" stroke="#0088ff" stroke-width="2.5" stroke-dasharray="8,3" opacity="0.7" filter="url(#neonGlowBlue)"/>
    <path d="M 5,-35 Q 25,-27 42,-37 Q 56,-44 65,-34" fill="none" stroke="#00ffff" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
    <path d="M 6,-32 Q 20,-24 35,-32 Q 48,-38 55,-30" fill="none" stroke="#0088ff" stroke-width="1" stroke-dasharray="4,5" opacity="0.3"/>

    <!-- Legs (wide stance, ready) -->
    <path d="M -5,30 L -20,72 L -28,90" fill="none" stroke="#050a14" stroke-width="9" stroke-linecap="round"/>
    <path d="M -5,30 L -20,72 L -28,90" fill="none" stroke="#0088ff" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Knee armor node -->
    <circle cx="-20" cy="72" r="2" fill="#0088ff" filter="url(#neonGlowBlue)"/>
    <path d="M 5,30 L 18,68 L 25,88" fill="none" stroke="#050a14" stroke-width="9" stroke-linecap="round"/>
    <path d="M 5,30 L 18,68 L 25,88" fill="none" stroke="#00ffff" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="18" cy="68" r="2" fill="#00ffff" filter="url(#neonGlowCyan)"/>
    <!-- Boots -->
    <path d="M -28,88 L -35,93 L -24,93" fill="#050a14" stroke="#00ffff" stroke-width="1"/>
    <path d="M 25,86 L 32,91 L 21,91" fill="#050a14" stroke="#0088ff" stroke-width="1"/>

    <!-- Torso (slightly turned, combat-ready) -->
    <polygon points="-20,30 20,30 17,-10 6,-25 -9,-25 -17,-10" fill="#050a14" stroke="#00ffff" stroke-width="1.5"/>
    <!-- Chest armor plates -->
    <path d="M -10,-5 L 0,6 L 10,-5" fill="none" stroke="#0088ff" stroke-width="2" filter="url(#neonGlowBlue)"/>
    <line x1="0" y1="6" x2="0" y2="26" stroke="#00ffff" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
    <!-- Side armor lines -->
    <line x1="-16" y1="0" x2="-14" y2="20" stroke="#0088ff" stroke-width="0.8" opacity="0.4"/>
    <line x1="16" y1="0" x2="14" y2="20" stroke="#0088ff" stroke-width="0.8" opacity="0.4"/>
    <!-- Belt / obi -->
    <path d="M -18,22 L 18,22" stroke="#00ffff" stroke-width="2"/>
    <path d="M -18,26 L 18,26" stroke="#0088ff" stroke-width="1" opacity="0.6"/>

    <!-- Shoulder pads -->
    <path d="M -17,-10 L -28,-18 L -22,-22 L -9,-15" fill="#0a0a1e" stroke="#00ffff" stroke-width="1.2"/>
    <path d="M 17,-10 L 28,-18 L 22,-22 L 9,-15" fill="#0a0a1e" stroke="#0088ff" stroke-width="1.2"/>
    <circle cx="-25" cy="-18" r="1.5" fill="#00ffff" filter="url(#neonGlowCyan)"/>
    <circle cx="25" cy="-18" r="1.5" fill="#0088ff" filter="url(#neonGlowBlue)"/>

    <!-- Left arm (resting on sheathed sword) -->
    <path d="M -17,-10 Q -30,8 -25,30" fill="none" stroke="#050a14" stroke-width="7" stroke-linecap="round"/>
    <path d="M -17,-10 Q -30,8 -25,30" fill="none" stroke="#0088ff" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Sheathed second sword (on left hip) -->
    <g transform="translate(-22, 25) rotate(15)">
      <rect x="-1.5" y="0" width="3" height="35" fill="#0a0a1e" stroke="#0088ff" stroke-width="0.8"/>
      <polygon points="-2.5,0 2.5,0 1.5,-3 -1.5,-3" fill="#0d0d20" stroke="#0088ff" stroke-width="0.6"/>
      <!-- Sheath tip -->
      <polygon points="-1.5,35 1.5,35 0,38" fill="#0088ff"/>
    </g>

    <!-- Right arm (extended back, holding katana) -->
    <path d="M 17,-10 Q 32,-22 36,-38" fill="none" stroke="#050a14" stroke-width="7" stroke-linecap="round"/>
    <path d="M 17,-10 Q 32,-22 36,-38" fill="none" stroke="#00ffff" stroke-width="2" stroke-linecap="round"/>

    <!-- THE KATANA (held in right hand, angled back) -->
    <g transform="translate(37, -42) rotate(-30)">
      <!-- Pommel -->
      <polygon points="-3,27 3,27 4,31 0,34 -4,31" fill="#0a0a1e" stroke="#00ffff" stroke-width="0.8"/>
      <!-- Handle -->
      <rect x="-3" y="5" width="6" height="22" fill="#050a14" stroke="#0088ff" stroke-width="1.2"/>
      <line x1="-3" y1="9" x2="3" y2="7" stroke="#00ffff" stroke-width="0.7" opacity="0.7"/>
      <line x1="-3" y1="14" x2="3" y2="12" stroke="#00ffff" stroke-width="0.7" opacity="0.7"/>
      <line x1="-3" y1="19" x2="3" y2="17" stroke="#00ffff" stroke-width="0.7" opacity="0.7"/>
      <line x1="-3" y1="24" x2="3" y2="22" stroke="#00ffff" stroke-width="0.7" opacity="0.7"/>
      <!-- Guard -->
      <polygon points="-10,5 10,5 8,0 -8,0" fill="#0d0d20" stroke="#0088ff" stroke-width="1.2" filter="url(#neonGlowBlue)"/>
      <circle cx="-7" cy="2.5" r="1.5" fill="#00ffff"/>
      <circle cx="7" cy="2.5" r="1.5" fill="#00ffff"/>
      <!-- Blade glow -->
      <polygon points="-6,0 6,0 3,-55 0,-68 -3,-55" fill="#0088ff" opacity="0.15" filter="url(#neonGlowCyan)"/>
      <!-- Blade body -->
      <polygon points="-5,0 5,0 2.5,-53 0,-65 -2.5,-53" fill="#0a152b" stroke="#00ffff" stroke-width="1.2" filter="url(#neonGlowCyan)"/>
      <!-- Blade core -->
      <polygon points="-2,0 2,0 1,-50 0,-60 -1,-50" fill="#ccf0ff" opacity="0.8"/>
      <line x1="0" y1="-2" x2="0" y2="-58" stroke="#fff" stroke-width="0.6" opacity="0.4"/>
    </g>

    <!-- Head (cyber-kasa hat) -->
    <path d="M -25,-30 Q 0,-42 25,-30 Q 18,-24 0,-22 Q -18,-24 -25,-30 Z" fill="#0a0a1e" stroke="#00ffff" stroke-width="1.5"/>
    <!-- Hat top ridge -->
    <path d="M -8,-36 Q 0,-40 8,-36" fill="none" stroke="#0088ff" stroke-width="1.5" filter="url(#neonGlowBlue)"/>
    <!-- Hat circuit detail -->
    <path d="M -18,-30 Q -10,-34 0,-32 Q 10,-34 18,-30" fill="none" stroke="#00ffff" stroke-width="0.5" opacity="0.4"/>
    <!-- Face shadow underneath -->
    <path d="M -10,-26 L 0,-21 L 10,-26" fill="#020510"/>
    <!-- Visor glow -->
    <line x1="-7" y1="-26" x2="7" y2="-26" stroke="#00ffff" stroke-width="2.5" filter="url(#neonGlowCyan)"/>
    <line x1="-6" y1="-26" x2="6" y2="-26" stroke="#fff" stroke-width="1"/>
    <!-- Chin/jaw hint -->
    <path d="M -4,-22 L 0,-19 L 4,-22" fill="none" stroke="#0088ff" stroke-width="0.5" opacity="0.4"/>

    <!-- Ground shadow -->
    <ellipse cx="0" cy="94" rx="35" ry="4" fill="#00ffff" opacity="0.08" filter="url(#neonGlowCyan)"/>
  </g>

  <text x="100" y="280" font-family="'Courier New', monospace" font-size="8" fill="#00ffff" text-anchor="middle" letter-spacing="4" opacity="0.6">Peer2Play</text>
</svg>
