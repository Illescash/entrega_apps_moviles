<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradEspada" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050a14"/>
      <stop offset="50%" stop-color="#0a152b"/>
      <stop offset="100%" stop-color="#020510"/>
    </linearGradient>
    <filter id="neonGlowBlue">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="6" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonGlowCyan">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="6" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="circuit" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 20 L 10 20 L 15 15 L 25 15 L 30 20 L 40 20 M 20 0 L 20 10 L 25 15 M 15 15 L 20 25 L 20 40" fill="none" stroke="#00ffff" stroke-width="0.5" stroke-opacity="0.15"/>
      <circle cx="10" cy="20" r="1" fill="#00ffff" fill-opacity="0.3"/>
      <circle cx="30" cy="20" r="1" fill="#00ffff" fill-opacity="0.3"/>
    </pattern>

    <g id="swordBase">
      <polygon points="-4,36 4,36 6,41 0,44 -6,41" fill="#0a0a1e" stroke="#00ffff" stroke-width="1"/>
      <circle cx="0" cy="39" r="1.2" fill="#00ffff" filter="url(#neonGlowCyan)"/>
      <rect x="-3.5" y="13" width="7" height="23" fill="#050a14" stroke="#0088ff" stroke-width="1.2"/>
      <line x1="-3.5" y1="18" x2="3.5" y2="16" stroke="#00ffff" stroke-width="0.7" opacity="0.6"/>
      <line x1="-3.5" y1="24" x2="3.5" y2="22" stroke="#00ffff" stroke-width="0.7" opacity="0.6"/>
      <line x1="-3.5" y1="30" x2="3.5" y2="28" stroke="#00ffff" stroke-width="0.7" opacity="0.6"/>
      <polygon points="-18,13 18,13 15,7 -15,7" fill="#0d0d20" stroke="#0088ff" stroke-width="1.2" filter="url(#neonGlowBlue)"/>
      <circle cx="-13" cy="10" r="1.8" fill="#00ffff"/>
      <circle cx="13" cy="10" r="1.8" fill="#00ffff"/>
      <polygon points="-6,7 6,7 3,-42 0,-52 -3,-42" fill="#0088ff" opacity="0.2" filter="url(#neonGlowCyan)"/>
      <polygon points="-5.5,7 5.5,7 3,-40 0,-50 -3,-40" fill="#0a152b" stroke="#00ffff" stroke-width="1.2"/>
      <polygon points="-2.5,7 2.5,7 1.2,-38 0,-46 -1.2,-38" fill="#ccf0ff" opacity="0.8"/>
      <line x1="0" y1="5" x2="0" y2="-44" stroke="#fff" stroke-width="0.7" opacity="0.4"/>
    </g>
  </defs>

  <rect width="200" height="300" fill="url(#bgGradEspada)" rx="12" stroke="#444" stroke-width="1"/>
  <rect width="194" height="294" x="3" y="3" fill="url(#circuit)" rx="10"/>
  <path d="M 12 12 L 40 12 M 160 12 L 188 12 M 188 12 L 188 40 M 188 260 L 188 288 M 188 288 L 160 288 M 40 288 L 12 288 M 12 288 L 12 260 M 12 40 L 12 12" fill="none" stroke="#00ffff" stroke-width="3" filter="url(#neonGlowCyan)"/>

  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#fff" filter="url(#neonGlowCyan)">3</text>
  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#00ffff">3</text>
  <g transform="translate(178, 256) rotate(180)">
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#fff" filter="url(#neonGlowCyan)">3</text>
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#00ffff">3</text>
  </g>

  <!-- Three Swords (floating) -->
  <g><animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="3s" repeatCount="indefinite"/><use href="#swordBase" x="100" y="75"/></g>
  <g><animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="3.3s" repeatCount="indefinite"/><use href="#swordBase" x="65" y="210"/></g>
  <g><animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="3.6s" repeatCount="indefinite"/><use href="#swordBase" x="135" y="210"/></g>

  <!-- Tech connector -->
  <circle cx="100" cy="160" r="2" fill="#0088ff" filter="url(#neonGlowBlue)"/>
  <path d="M 100 120 L 100 145 M 80 195 L 96 165 M 120 195 L 104 165" fill="none" stroke="#0088ff" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.4"/>

  <text x="100" y="280" font-family="'Courier New', monospace" font-size="8" fill="#00ffff" text-anchor="middle" letter-spacing="4" opacity="0.6">Peer2Play</text>
</svg>
