<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05140a"/>
      <stop offset="50%" stop-color="#0a2b12"/>
      <stop offset="100%" stop-color="#021005"/>
    </linearGradient>
    <filter id="neonGlowGreen">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonGlowLime">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="circuit" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 20 L 10 20 L 15 15 L 25 15 L 30 20 L 40 20 M 20 0 L 20 10 L 25 15 M 15 15 L 20 25 L 20 40" fill="none" stroke="#ccff00" stroke-width="0.5" stroke-opacity="0.15"/>
    </pattern>
  </defs>

  <rect width="200" height="300" fill="url(#bgGrad)" rx="12" stroke="#444" stroke-width="1"/>
  <rect width="194" height="294" x="3" y="3" fill="url(#circuit)" rx="10"/>
  <path d="M 12 12 L 40 12 M 160 12 L 188 12 M 188 12 L 188 40 M 188 260 L 188 288 M 188 288 L 160 288 M 40 288 L 12 288 M 12 288 L 12 260 M 12 40 L 12 12" fill="none" stroke="#ccff00" stroke-width="3" filter="url(#neonGlowLime)"/>
  <path d="M 60 12 L 140 12 M 60 288 L 140 288 M 188 80 L 188 220 M 12 80 L 12 220" fill="none" stroke="#00ff00" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.8"/>

  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#fff" filter="url(#neonGlowLime)">11</text>
  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#ccff00">11</text>
  <g transform="translate(178, 256) rotate(180)">
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#fff" filter="url(#neonGlowLime)">11</text>
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#ccff00">11</text>
  </g>

  <!-- THE BERSERKER (Caballo de Bastos) - Mid-charge, dual maces, chains flying -->
  <g transform="translate(100, 155) scale(1.1)">

    <!-- === MOTION BLUR / RAGE AURA === -->
    <g opacity="0.4">
      <line x1="-70" y1="20" x2="-45" y2="15" stroke="#00ff00" stroke-width="2" stroke-dasharray="8,4"/>
      <line x1="-65" y1="40" x2="-40" y2="38" stroke="#ccff00" stroke-width="1.5" stroke-dasharray="6,5"/>
      <line x1="-72" y1="0" x2="-50" y2="-5" stroke="#00ff00" stroke-width="1" stroke-dasharray="5,6"/>
      <line x1="-68" y1="-20" x2="-48" y2="-22" stroke="#ccff00" stroke-width="1.5" stroke-dasharray="7,4"/>
      <line x1="-60" y1="60" x2="-42" y2="58" stroke="#00ff00" stroke-width="0.8" stroke-dasharray="4,6"/>
    </g>

    <!-- Dust/debris kicked up -->
    <g opacity="0.3">
      <circle cx="-35" cy="80" r="3" fill="#ccff00" filter="url(#neonGlowLime)">
        <animate attributeName="cx" values="-35;-55" dur="1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0" dur="1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-25" cy="85" r="2" fill="#00ff00">
        <animate attributeName="cx" values="-25;-50" dur="1.3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.2;0" dur="1.3s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- === CHAINS (flying behind from momentum) === -->
    <path d="M -15,-15 Q -40,-8 -55,-20 Q -65,-28 -58,-40" fill="none" stroke="#ccff00" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
    <path d="M -10,10 Q -35,18 -50,10 Q -60,5 -55,-8" fill="none" stroke="#00ff00" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
    <!-- Chain end weights -->
    <circle cx="-58" cy="-40" r="3" fill="#0d1a0d" stroke="#ccff00" stroke-width="1"/>
    <circle cx="-55" cy="-8" r="2.5" fill="#0d1a0d" stroke="#00ff00" stroke-width="1"/>

    <!-- === LEGS (mid-stride, charging) === -->
    <!-- Back leg (pushing off) -->
    <path d="M -10,30 L -28,55 L -35,80" fill="none" stroke="#071407" stroke-width="12" stroke-linecap="round"/>
    <path d="M -10,30 L -28,55 L -35,80" fill="none" stroke="#00ff00" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="-28" cy="55" r="2.5" fill="#0a1a0a" stroke="#ccff00" stroke-width="1"/>
    <path d="M -40,78 L -44,86 L -28,86 L -26,80" fill="#071407" stroke="#00ff00" stroke-width="1"/>

    <!-- Front leg (lunging forward) -->
    <path d="M 10,30 L 25,55 L 32,78" fill="none" stroke="#071407" stroke-width="12" stroke-linecap="round"/>
    <path d="M 10,30 L 25,55 L 32,78" fill="none" stroke="#ccff00" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="25" cy="55" r="2.5" fill="#0a1a0a" stroke="#ccff00" stroke-width="1"/>
    <path d="M 26,76 L 24,84 L 42,84 L 40,77" fill="#071407" stroke="#ccff00" stroke-width="1"/>

    <!-- === TORSO (leaning forward, charging posture) === -->
    <polygon points="-22,30 22,30 25,-5 15,-25 -10,-25 -20,-5" fill="#071407" stroke="#00ff00" stroke-width="2"/>
    <!-- Chest plates (battle-damaged) -->
    <path d="M -10,-8 L 5,2 L 18,-8" fill="none" stroke="#ccff00" stroke-width="2" filter="url(#neonGlowLime)"/>
    <line x1="5" y1="2" x2="5" y2="22" stroke="#00ff00" stroke-width="0.8" opacity="0.4"/>
    <!-- Damage marks -->
    <line x1="-15" y1="5" x2="-5" y2="18" stroke="#ccff00" stroke-width="1" opacity="0.3"/>
    <line x1="10" y1="-2" x2="20" y2="15" stroke="#ccff00" stroke-width="0.8" opacity="0.25"/>
    <!-- Rivet bolts -->
    <circle cx="-18" cy="8" r="2" fill="#0d1a0d" stroke="#ccff00" stroke-width="0.8"/>
    <circle cx="20" cy="8" r="2" fill="#0d1a0d" stroke="#ccff00" stroke-width="0.8"/>
    <!-- Rage core (overheating, fast pulse) -->
    <circle cx="5" cy="0" r="4" fill="#021005" stroke="#ccff00" stroke-width="1.5"/>
    <circle cx="5" cy="0" r="2" fill="#ccff00" filter="url(#neonGlowLime)">
      <animate attributeName="r" values="1.5;3;1.5" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="0.5s" repeatCount="indefinite"/>
    </circle>

    <!-- === SHOULDERS (huge, with spikes, asymmetric) === -->
    <!-- Left -->
    <path d="M -20,-5 L -40,-15 L -36,-28 L -25,-30 L -10,-18" fill="#0a1a0a" stroke="#00ff00" stroke-width="2"/>
    <path d="M -36,-28 L -44,-40 L -34,-32" fill="#00ff00" opacity="0.5" filter="url(#neonGlowGreen)"/>
    <path d="M -38,-22 L -48,-30 L -40,-25" fill="#ccff00" opacity="0.4" filter="url(#neonGlowLime)"/>
    <circle cx="-38" cy="-22" r="2.5" fill="#ccff00" filter="url(#neonGlowLime)"/>
    <!-- Right -->
    <path d="M 22,-5 L 42,-12 L 40,-26 L 30,-28 L 15,-18" fill="#0a1a0a" stroke="#ccff00" stroke-width="2"/>
    <path d="M 40,-26 L 50,-38 L 38,-30" fill="#ccff00" opacity="0.5" filter="url(#neonGlowLime)"/>
    <path d="M 36,-20 L 46,-28 L 38,-22" fill="#00ff00" opacity="0.4" filter="url(#neonGlowGreen)"/>
    <circle cx="38" cy="-20" r="2.5" fill="#00ff00" filter="url(#neonGlowGreen)"/>

    <!-- === LEFT ARM + MACE (swung back, about to strike) === -->
    <path d="M -22,-8 Q -40,-20 -45,-42" fill="none" stroke="#071407" stroke-width="10" stroke-linecap="round"/>
    <path d="M -22,-8 Q -40,-20 -45,-42" fill="none" stroke="#00ff00" stroke-width="2" stroke-linecap="round"/>

    <!-- Left mace (swung back) -->
    <g transform="translate(-48, -48) rotate(30)">
      <rect x="-2.5" y="2" width="5" height="22" fill="#071407" stroke="#00ff00" stroke-width="0.8"/>
      <line x1="0" y1="4" x2="0" y2="22" stroke="#ccff00" stroke-width="0.8" opacity="0.4"/>
      <polygon points="-7,2 7,2 5,-2 -5,-2" fill="#0d1a0d" stroke="#ccff00" stroke-width="0.8"/>
      <polygon points="-12,-5 -9,-16 -3,-20 3,-20 9,-16 12,-5 9,2 -9,2" fill="#0a1a0a" stroke="#00ff00" stroke-width="1.5"/>
      <path d="M -12,-10 L -17,-12 L -16,-7 L -12,-4" fill="#0a1a0a" stroke="#00ff00" stroke-width="0.8"/>
      <path d="M 12,-10 L 17,-12 L 16,-7 L 12,-4" fill="#0a1a0a" stroke="#00ff00" stroke-width="0.8"/>
      <path d="M 0,-20 L -3,-26 L 3,-26 Z" fill="#0a1a0a" stroke="#ccff00" stroke-width="0.8"/>
      <circle cx="0" cy="-8" r="5" fill="#021005" stroke="#00ff00" stroke-width="1"/>
      <polygon points="0,-13 1.5,-10 5,-8 1.5,-6 0,-3 -1.5,-6 -5,-8 -1.5,-10" fill="#ccff00" filter="drop-shadow(0 0 3px #ccff00)"/>
      <circle cx="0" cy="-8" r="1.5" fill="#fff" filter="url(#neonGlowLime)">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="0.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-15" cy="-10" r="1.5" fill="#ccff00" filter="url(#neonGlowLime)" opacity="0.7"/>
      <circle cx="15" cy="-10" r="1.5" fill="#ccff00" filter="url(#neonGlowLime)" opacity="0.7"/>
    </g>

    <!-- === RIGHT ARM + MACE (swung forward, striking!) === -->
    <path d="M 25,-8 Q 40,-25 50,-48" fill="none" stroke="#071407" stroke-width="10" stroke-linecap="round"/>
    <path d="M 25,-8 Q 40,-25 50,-48" fill="none" stroke="#ccff00" stroke-width="2" stroke-linecap="round"/>

    <!-- Right mace (thrust forward, striking) -->
    <g transform="translate(52, -55) rotate(-25)">
      <rect x="-2.5" y="2" width="5" height="22" fill="#071407" stroke="#00ff00" stroke-width="0.8"/>
      <line x1="0" y1="4" x2="0" y2="22" stroke="#ccff00" stroke-width="0.8" opacity="0.4"/>
      <polygon points="-7,2 7,2 5,-2 -5,-2" fill="#0d1a0d" stroke="#ccff00" stroke-width="0.8"/>
      <polygon points="-12,-5 -9,-16 -3,-20 3,-20 9,-16 12,-5 9,2 -9,2" fill="#0a1a0a" stroke="#00ff00" stroke-width="1.5"/>
      <path d="M -12,-10 L -17,-12 L -16,-7 L -12,-4" fill="#0a1a0a" stroke="#00ff00" stroke-width="0.8"/>
      <path d="M 12,-10 L 17,-12 L 16,-7 L 12,-4" fill="#0a1a0a" stroke="#00ff00" stroke-width="0.8"/>
      <path d="M 0,-20 L -3,-26 L 3,-26 Z" fill="#0a1a0a" stroke="#ccff00" stroke-width="0.8"/>
      <circle cx="0" cy="-8" r="5" fill="#021005" stroke="#00ff00" stroke-width="1"/>
      <polygon points="0,-13 1.5,-10 5,-8 1.5,-6 0,-3 -1.5,-6 -5,-8 -1.5,-10" fill="#ccff00" filter="drop-shadow(0 0 3px #ccff00)"/>
      <circle cx="0" cy="-8" r="1.5" fill="#fff" filter="url(#neonGlowLime)">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="0.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-15" cy="-10" r="1.5" fill="#ccff00" filter="url(#neonGlowLime)" opacity="0.7"/>
      <circle cx="15" cy="-10" r="1.5" fill="#ccff00" filter="url(#neonGlowLime)" opacity="0.7"/>
      <!-- Impact sparks on forward mace -->
      <circle cx="0" cy="-24" r="3" fill="#ccff00" filter="url(#neonGlowLime)" opacity="0.5">
        <animate attributeName="r" values="2;5;2" dur="0.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="0.4s" repeatCount="indefinite"/>
      </circle>
      <!-- Electric arc from strike -->
      <path d="M 0,-24 Q -8,-32 -4,-38" fill="none" stroke="#ccff00" stroke-width="1" filter="url(#neonGlowLime)" opacity="0.6">
        <animate attributeName="d" values="M 0,-24 Q -8,-32 -4,-38;M 0,-24 Q 6,-34 2,-40;M 0,-24 Q -8,-32 -4,-38" dur="0.3s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- === HEAD (small, enraged, mouth open screaming) === -->
    <g>
      <rect x="-7" y="-28" width="14" height="6" fill="#071407"/>
      <!-- Head -->
      <path d="M -14,-30 Q -16,-44 -12,-52 Q 0,-60 12,-52 Q 16,-44 14,-30 Z" fill="#071407" stroke="#00ff00" stroke-width="2"/>
      <!-- Heavy brow (furrowed in rage) -->
      <path d="M -12,-45 L -6,-48 L 0,-45 L 6,-48 L 12,-45" fill="#050f05" stroke="#ccff00" stroke-width="1.5"/>
      <!-- Eyes (wide, furious, glowing intensely) -->
      <ellipse cx="-5" cy="-42" rx="3" ry="2.5" fill="#021005" stroke="#00ff00" stroke-width="1"/>
      <circle cx="-5" cy="-42" r="2" fill="#ccff00" filter="url(#neonGlowLime)">
        <animate attributeName="opacity" values="0.8;1;0.8" dur="0.3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-5" cy="-42" r="0.8" fill="#fff"/>
      <ellipse cx="5" cy="-42" rx="3" ry="2.5" fill="#021005" stroke="#00ff00" stroke-width="1"/>
      <circle cx="5" cy="-42" r="2" fill="#ccff00" filter="url(#neonGlowLime)">
        <animate attributeName="opacity" values="1;0.8;1" dur="0.3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="5" cy="-42" r="0.8" fill="#fff"/>
      <!-- Mouth (open, SCREAMING, metal teeth) -->
      <path d="M -10,-32 Q 0,-25 10,-32" fill="#021005" stroke="#00ff00" stroke-width="1.2"/>
      <line x1="-7" y1="-32" x2="-7" y2="-28" stroke="#ccff00" stroke-width="1.2"/>
      <line x1="-3" y1="-31" x2="-3" y2="-27" stroke="#ccff00" stroke-width="1.2"/>
      <line x1="1" y1="-30" x2="1" y2="-27" stroke="#ccff00" stroke-width="1.2"/>
      <line x1="5" y1="-31" x2="5" y2="-27" stroke="#ccff00" stroke-width="1.2"/>
      <line x1="9" y1="-32" x2="9" y2="-28" stroke="#ccff00" stroke-width="1.2"/>
      <!-- Head implants (overloading) -->
      <circle cx="-12" cy="-48" r="2" fill="#0d1a0d" stroke="#ccff00" stroke-width="0.8"/>
      <circle cx="12" cy="-48" r="2" fill="#0d1a0d" stroke="#ccff00" stroke-width="0.8"/>
      <!-- Sparking cables (rage overload) -->
      <path d="M -12,-50 L -16,-56 L -12,-60" fill="none" stroke="#ccff00" stroke-width="2" stroke-linecap="round"/>
      <path d="M 12,-50 L 16,-56 L 12,-60" fill="none" stroke="#ccff00" stroke-width="2" stroke-linecap="round"/>
      <circle cx="-12" cy="-60" r="2" fill="#ccff00" filter="url(#neonGlowLime)">
        <animate attributeName="r" values="1;3;1" dur="0.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="12" cy="-60" r="2" fill="#ccff00" filter="url(#neonGlowLime)">
        <animate attributeName="r" values="1;3;1" dur="0.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Ground impact -->
    <ellipse cx="5" cy="88" rx="35" ry="4" fill="#00ff00" opacity="0.06" filter="url(#neonGlowGreen)"/>
  </g>

  <text x="100" y="280" font-family="'Courier New', monospace" font-size="8" fill="#ccff00" text-anchor="middle" letter-spacing="4" opacity="0.6">Peer2Play</text>
</svg>
