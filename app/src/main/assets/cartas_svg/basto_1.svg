<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient for Bastos (Dark Green) -->
    <linearGradient id="bgGradBasto" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05140a"/>
      <stop offset="50%" stop-color="#0a2b12"/>
      <stop offset="100%" stop-color="#021005"/>
    </linearGradient>

    <!-- Glowing Effects -->
    <filter id="neonGlowGreen">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonGlowLime">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Circuit Pattern for Background -->
    <pattern id="circuit" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 20 L 10 20 L 15 15 L 25 15 L 30 20 L 40 20 M 20 0 L 20 10 L 25 15 M 15 15 L 20 25 L 20 40" fill="none" stroke="#ccff00" stroke-width="0.5" stroke-opacity="0.15"/>
      <circle cx="10" cy="20" r="1" fill="#ccff00" fill-opacity="0.3"/>
      <circle cx="30" cy="20" r="1" fill="#ccff00" fill-opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Card Body -->
  <rect width="200" height="300" fill="url(#bgGradBasto)" rx="12" stroke="#444" stroke-width="1"/>
  <rect width="194" height="294" x="3" y="3" fill="url(#circuit)" rx="10"/>

  <!-- Cyberpunk Borders Bastos -->
  <path d="M 12 12 L 40 12 M 160 12 L 188 12 M 188 12 L 188 40 M 188 260 L 188 288 M 188 288 L 160 288 M 40 288 L 12 288 M 12 288 L 12 260 M 12 40 L 12 12" fill="none" stroke="#ccff00" stroke-width="3" filter="url(#neonGlowLime)"/>
  <path d="M 60 12 L 140 12 M 60 288 L 140 288 M 188 80 L 188 220 M 12 80 L 12 220" fill="none" stroke="#00ff00" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.8"/>

  <!-- Top-left Number -->
  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#fff" filter="url(#neonGlowLime)">1</text>
  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#ccff00">1</text>

  <!-- Bottom-right Number -->
  <g transform="translate(178, 256) rotate(180)">
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#fff" filter="url(#neonGlowLime)">1</text>
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="28" fill="#ccff00">1</text>
  </g>

  <!-- AS DE BASTOS - PLASMA WAR MACE -->
  <g transform="translate(100, 155)">

    <!-- === AMBIENT ENERGY FIELD === -->
    <ellipse cx="0" cy="-20" rx="55" ry="80" fill="none" stroke="#00ff00" stroke-width="1" stroke-dasharray="3,15" opacity="0.15" filter="url(#neonGlowGreen)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="25s" repeatCount="indefinite"/>
    </ellipse>

    <!-- === POMMEL (bottom) === -->
    <g transform="translate(0, 92)">
      <polygon points="-10,0 10,0 13,10 5,18 -5,18 -13,10" fill="#0a1a0a" stroke="#ccff00" stroke-width="1.5"/>
      <circle cx="0" cy="9" r="3.5" fill="#0a2b12" stroke="#00ff00" stroke-width="1"/>
      <circle cx="0" cy="9" r="1.5" fill="#ccff00" filter="url(#neonGlowLime)">
        <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite"/>
      </circle>
      <line x1="-7" y1="3" x2="7" y2="3" stroke="#00ff00" stroke-width="0.6" opacity="0.5"/>
    </g>

    <!-- === HANDLE / GRIP === -->
    <rect x="-8" y="30" width="16" height="62" rx="3" fill="#071407" stroke="#00ff00" stroke-width="1.5"/>
    <!-- Grip wrapping -->
    <g stroke="#ccff00" stroke-width="0.8" opacity="0.6">
      <line x1="-8" y1="36" x2="8" y2="33"/>
      <line x1="-8" y1="43" x2="8" y2="40"/>
      <line x1="-8" y1="50" x2="8" y2="47"/>
      <line x1="-8" y1="57" x2="8" y2="54"/>
      <line x1="-8" y1="64" x2="8" y2="61"/>
      <line x1="-8" y1="71" x2="8" y2="68"/>
      <line x1="-8" y1="78" x2="8" y2="75"/>
      <line x1="-8" y1="85" x2="8" y2="82"/>
    </g>
    <!-- Central conduit -->
    <line x1="0" y1="32" x2="0" y2="90" stroke="#00ff00" stroke-width="2" filter="url(#neonGlowGreen)" opacity="0.5"/>
    <!-- Grip energy nodes -->
    <circle cx="0" cy="42" r="1.5" fill="#ccff00" opacity="0.7"/>
    <circle cx="0" cy="58" r="1.5" fill="#ccff00" opacity="0.7"/>
    <circle cx="0" cy="74" r="1.5" fill="#ccff00" opacity="0.7"/>

    <!-- === GUARD / COLLAR === -->
    <g transform="translate(0, 28)">
      <polygon points="-20,5 20,5 16,-5 -16,-5" fill="#0d1a0d" stroke="#ccff00" stroke-width="2" filter="url(#neonGlowLime)"/>
      <line x1="-16" y1="-5" x2="16" y2="-5" stroke="#00ff00" stroke-width="1" filter="url(#neonGlowGreen)"/>
      <!-- Guard wing extensions -->
      <path d="M -16,0 L -28,-8 L -24,-14 L -12,-5" fill="#0a1a0a" stroke="#ccff00" stroke-width="1.2"/>
      <path d="M 16,0 L 28,-8 L 24,-14 L 12,-5" fill="#0a1a0a" stroke="#ccff00" stroke-width="1.2"/>
      <circle cx="-25" cy="-10" r="2" fill="#00ff00" filter="url(#neonGlowGreen)"/>
      <circle cx="25" cy="-10" r="2" fill="#00ff00" filter="url(#neonGlowGreen)"/>
      <!-- Guard center -->
      <polygon points="0,-8 5,0 0,8 -5,0" fill="none" stroke="#ccff00" stroke-width="0.8" opacity="0.5"/>
      <circle cx="0" cy="0" r="1.5" fill="#ccff00" filter="url(#neonGlowLime)">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- === SHAFT (between guard and mace head) === -->
    <path d="M -10,22 L -14,-30 L 14,-30 L 10,22 Z" fill="#071407" stroke="#00ff00" stroke-width="1.5"/>
    <!-- Shaft tech lines -->
    <line x1="-6" y1="18" x2="-8" y2="-26" stroke="#ccff00" stroke-width="0.8" opacity="0.4"/>
    <line x1="6" y1="18" x2="8" y2="-26" stroke="#ccff00" stroke-width="0.8" opacity="0.4"/>
    <!-- Shaft energy conduits -->
    <line x1="-3" y1="20" x2="-3" y2="-28" stroke="#00ff00" stroke-width="1.5" filter="url(#neonGlowGreen)" opacity="0.6"/>
    <line x1="3" y1="20" x2="3" y2="-28" stroke="#00ff00" stroke-width="1.5" filter="url(#neonGlowGreen)" opacity="0.6"/>
    <!-- Central power line -->
    <line x1="0" y1="18" x2="0" y2="-28" stroke="#fff" stroke-width="1.5" opacity="0.3" filter="drop-shadow(0 0 3px #ccff00)"/>

    <!-- Shaft coil rings -->
    <ellipse cx="0" cy="10" rx="13" ry="3" fill="none" stroke="#ccff00" stroke-width="1.5" filter="url(#neonGlowLime)"/>
    <ellipse cx="0" cy="-5" rx="14" ry="3" fill="none" stroke="#ccff00" stroke-width="1.5" filter="url(#neonGlowLime)"/>
    <ellipse cx="0" cy="-20" rx="15" ry="3" fill="none" stroke="#ccff00" stroke-width="1.5" filter="url(#neonGlowLime)"/>

    <!-- Energy particles flowing up the shaft -->
    <circle cx="-2" cy="15" r="1" fill="#ccff00" opacity="0.6">
      <animate attributeName="cy" values="18;-28" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="2" cy="10" r="0.8" fill="#fff" opacity="0.5">
      <animate attributeName="cy" values="15;-25" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0" dur="1.8s" repeatCount="indefinite"/>
    </circle>

    <!-- === MACE HEAD (the brutal part) === -->
    <g transform="translate(0, -50)">
      <!-- Outer housing (octagonal, heavy) -->
      <polygon points="-28,-5 -22,-22 -8,-30 8,-30 22,-22 28,-5 22,12 -22,12" fill="#0a1a0a" stroke="#00ff00" stroke-width="2"/>
      <!-- Inner plating -->
      <polygon points="-22,-3 -17,-18 -6,-25 6,-25 17,-18 22,-3 17,8 -17,8" fill="#071407" stroke="#ccff00" stroke-width="1"/>

      <!-- Reinforcement bolts -->
      <circle cx="-22" cy="-3" r="2" fill="#0d1a0d" stroke="#ccff00" stroke-width="1"/>
      <circle cx="22" cy="-3" r="2" fill="#0d1a0d" stroke="#ccff00" stroke-width="1"/>
      <circle cx="-8" cy="-28" r="2" fill="#0d1a0d" stroke="#ccff00" stroke-width="1"/>
      <circle cx="8" cy="-28" r="2" fill="#0d1a0d" stroke="#ccff00" stroke-width="1"/>

      <!-- Power vanes (protruding, aggressive) -->
      <path d="M -22,-14 L -35,-18 L -32,-8 L -22,0" fill="#0a1a0a" stroke="#00ff00" stroke-width="1.5"/>
      <path d="M 22,-14 L 35,-18 L 32,-8 L 22,0" fill="#0a1a0a" stroke="#00ff00" stroke-width="1.5"/>
      <path d="M 0,-30 L -5,-42 L 5,-42 Z" fill="#0a1a0a" stroke="#ccff00" stroke-width="1.5"/>
      <!-- Vane tip glows -->
      <circle cx="-34" cy="-14" r="2" fill="#ccff00" filter="url(#neonGlowLime)">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="34" cy="-14" r="2" fill="#ccff00" filter="url(#neonGlowLime)">
        <animate attributeName="opacity" values="1;0.4;1" dur="1.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="-40" r="2" fill="#ccff00" filter="url(#neonGlowLime)">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="0.8s" repeatCount="indefinite"/>
      </circle>

      <!-- ENERGY CORE (center of mace head) -->
      <circle cx="0" cy="-8" r="12" fill="#021005" stroke="#00ff00" stroke-width="2"/>
      <circle cx="0" cy="-8" r="9" fill="#0a2b12" stroke="#ccff00" stroke-width="1"/>
      <!-- Core inner star -->
      <polygon points="0,-16 3,-11 8,-8 3,-5 0,0 -3,-5 -8,-8 -3,-11" fill="#ccff00" filter="drop-shadow(0 0 6px #ccff00)"/>
      <circle cx="0" cy="-8" r="3" fill="#fff" filter="url(#neonGlowLime)">
        <animate attributeName="r" values="2;4;2" dur="1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;1;0.6" dur="1s" repeatCount="indefinite"/>
      </circle>
      <!-- Core rotating ring -->
      <circle cx="0" cy="-8" r="16" fill="none" stroke="#ccff00" stroke-width="1" stroke-dasharray="4,6">
        <animateTransform attributeName="transform" type="rotate" from="0 0 -8" to="360 0 -8" dur="6s" repeatCount="indefinite"/>
      </circle>

      <!-- ELECTRIC ARCS from mace head -->
      <path d="M -28,-5 Q -38,5 -45,-2" fill="none" stroke="#ccff00" stroke-width="1.5" filter="url(#neonGlowLime)" opacity="0.6">
        <animate attributeName="d" values="M -28,-5 Q -38,5 -45,-2;M -28,-5 Q -40,-10 -48,-5;M -28,-5 Q -38,5 -45,-2" dur="0.4s" repeatCount="indefinite"/>
      </path>
      <path d="M 28,-5 Q 38,5 45,-2" fill="none" stroke="#ccff00" stroke-width="1.5" filter="url(#neonGlowLime)" opacity="0.6">
        <animate attributeName="d" values="M 28,-5 Q 38,5 45,-2;M 28,-5 Q 40,-10 48,-5;M 28,-5 Q 38,5 45,-2" dur="0.5s" repeatCount="indefinite"/>
      </path>
      <path d="M 0,-30 Q -8,-38 -5,-48" fill="none" stroke="#00ff00" stroke-width="1" filter="url(#neonGlowGreen)" opacity="0.5">
        <animate attributeName="d" values="M 0,-30 Q -8,-38 -5,-48;M 0,-30 Q 5,-40 8,-46;M 0,-30 Q -8,-38 -5,-48" dur="0.6s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- === FLOATING STAR above mace === -->
    <g transform="translate(0, -108)">
      <animateTransform attributeName="transform" type="translate" values="0,-110; 0,-106; 0,-110" dur="3s" repeatCount="indefinite"/>
      <circle r="10" fill="#00ff00" opacity="0.1" filter="url(#neonGlowGreen)">
        <animate attributeName="r" values="8;13;8" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.1;0.25;0.1" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle r="16" fill="none" stroke="#ccff00" stroke-width="0.5" stroke-dasharray="4,10" opacity="0.5">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
      </circle>
      <polygon points="0,-12 3.5,-3.5 12,0 3.5,3.5 0,12 -3.5,3.5 -12,0 -3.5,-3.5" fill="#fff" filter="drop-shadow(0 0 8px #fff)"/>
      <circle r="3.5" fill="#fff" filter="url(#neonGlowLime)">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="0.8s" repeatCount="indefinite"/>
      </circle>
      <!-- Crosshair -->
      <g stroke="#00ff00" stroke-width="0.5" opacity="0.6">
        <line x1="-16" y1="0" x2="-12" y2="0"/>
        <line x1="12" y1="0" x2="16" y2="0"/>
        <line x1="0" y1="-16" x2="0" y2="-12"/>
        <line x1="0" y1="12" x2="0" y2="16"/>
      </g>
    </g>

    <!-- Projection lines from mace to star -->
    <line x1="-4" y1="-95" x2="-6" y2="-104" stroke="#ccff00" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.3"/>
    <line x1="4" y1="-95" x2="6" y2="-104" stroke="#ccff00" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.3"/>
  </g>

  <!-- Holographic overlay text -->
  <text x="100" y="280" font-family="'Courier New', monospace" font-size="8" fill="#ccff00" text-anchor="middle" letter-spacing="4" opacity="0.6">Peer2Play</text>
</svg>
