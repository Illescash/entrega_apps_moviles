<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="50%" stop-color="#12122b"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>

    <!-- Glowing Effects -->
    <filter id="neonGlowCyan">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="neonGlowMagenta">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Coin Metallic Gradient -->
    <linearGradient id="goldGradient" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#fffb00"/>
      <stop offset="30%" stop-color="#ffcc00"/>
      <stop offset="70%" stop-color="#ff9900"/>
      <stop offset="100%" stop-color="#cc6600"/>
    </linearGradient>

    <!-- Circuit Pattern for Background -->
    <pattern id="circuit" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 20 L 10 20 L 15 15 L 25 15 L 30 20 L 40 20 M 20 0 L 20 10 L 25 15 M 15 15 L 20 25 L 20 40" fill="none" stroke="#00ffff" stroke-width="0.5" stroke-opacity="0.15"/>
    </pattern>

    <g id="cyberCoinFull">
      <circle cx="0" cy="0" r="26" fill="#1a1a1a" stroke="#333" stroke-width="3"/>
      <circle cx="0" cy="0" r="23" fill="url(#goldGradient)" filter="drop-shadow(0 0 6px #ffcc00)"/>
      <circle cx="0" cy="0" r="18" fill="none" stroke="#fff" stroke-width="1" stroke-opacity="0.3"/>
      <polygon points="0,-10 3,-3 10,0 3,3 0,10 -3,3 -10,0 -3,-3" fill="#fff" filter="drop-shadow(0 0 3px #fff)"/>
      <circle cx="0" cy="0" r="3.5" fill="#00ffff" filter="url(#neonGlowCyan)"/>
      <circle cx="0" cy="0" r="35" fill="none" stroke="#00ffff" stroke-width="1.5" stroke-dasharray="4,8">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
      </circle>
    </g>
  </defs>

  <rect width="200" height="300" fill="url(#bgGrad)" rx="12" stroke="#444" stroke-width="1"/>
  <rect width="194" height="294" x="3" y="3" fill="url(#circuit)" rx="10"/>

  <path d="M 12 12 L 40 12 M 160 12 L 188 12 M 188 12 L 188 40 M 188 260 L 188 288 M 188 288 L 160 288 M 40 288 L 12 288 M 12 288 L 12 260 M 12 40 L 12 12" fill="none" stroke="#00ffff" stroke-width="3" filter="url(#neonGlowCyan)"/>
  <path d="M 60 12 L 140 12 M 60 288 L 140 288 M 188 80 L 188 220 M 12 80 L 12 220" fill="none" stroke="#ff00ff" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.8"/>

  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#fff" filter="url(#neonGlowMagenta)">11</text>
  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#ff00ff">11</text>
  <g transform="translate(178, 256) rotate(180)">
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#fff" filter="url(#neonGlowMagenta)">11</text>
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#ff00ff">11</text>
  </g>

  <!-- REINA (11): The Cyber-Queen (Replaces Caballo) -->
  <g transform="translate(100, 155) scale(1.1)">
    <!-- Throne / Aura Background -->
    <path d="M 0,20 Q -60,-30 0,-100 Q 60,-30 0,20" fill="none" stroke="#ff00ff" stroke-width="1.5" stroke-dasharray="2,6" filter="url(#neonGlowMagenta)" opacity="0.6"/>

    <!-- Flowing Cyber-Gown / Base Skirt -->
    <path d="M 0,0 L -30,60 L -40,100 L 40,100 L 30,60 Z" fill="#0d0d1a" stroke="#00ffff" stroke-width="1.5"/>
    <path d="M -30,60 L 0,0 L 30,60" fill="none" stroke="#ff00ff" stroke-width="2" filter="url(#neonGlowMagenta)"/>
    <line x1="0" y1="0" x2="0" y2="100" stroke="#333" stroke-width="2"/>
    
    <!-- Torso Armor / Chestplate -->
    <polygon points="-15,0 -20,-30 0,-40 20,-30 15,0" fill="#151525" stroke="#00ffff" stroke-width="1.5"/>
    <path d="M -15,-20 L 0,-10 L 15,-20" fill="none" stroke="#ff00ff" stroke-width="2" filter="url(#neonGlowMagenta)"/>
    <polygon points="-10,-10 0,0 10,-10" fill="#222"/>

    <!-- High Tech Collar / Shoulders -->
    <path d="M -20,-30 L -35,-45 L -25,-55 L 0,-40 L 25,-55 L 35,-45 L 20,-30" fill="#050510" stroke="#00ffff" stroke-width="2" stroke-linejoin="round"/>
    <path d="M -25,-40 C -10,-60 10,-60 25,-40" fill="none" stroke="#ff00ff" stroke-width="1.5" filter="url(#neonGlowMagenta)"/>

    <!-- Head / Cyber-Visor -->
    <polygon points="-10,-45 -15,-65 0,-75 15,-65 10,-45" fill="#111" stroke="#333" stroke-width="1.5"/>
    <!-- Glowing Visor Slit -->
    <polygon points="-12,-60 0,-55 12,-60 0,-65" fill="#ff00ff" filter="url(#neonGlowMagenta)"/>
    <line x1="-8" y1="-60" x2="8" y2="-60" stroke="#fff" stroke-width="1.5"/>

    <!-- Hovering Crown / Halo -->
    <path d="M -20,-85 C 0,-100 20,-85 20,-85" fill="none" stroke="url(#goldGradient)" stroke-width="2" filter="drop-shadow(0 0 5px #ffcc00)"/>
    <circle cx="0" cy="-92" r="3" fill="#fff" filter="url(#neonGlowCyan)"/>
    <circle cx="-15" cy="-87" r="2" fill="#fff" filter="url(#neonGlowMagenta)"/>
    <circle cx="15" cy="-87" r="2" fill="#fff" filter="url(#neonGlowMagenta)"/>

    <!-- Data Braids / Cables falling down -->
    <path d="M -15,-65 Q -30,-40 -25,0" fill="none" stroke="#00ffff" stroke-width="2" stroke-dasharray="4,2"/>
    <path d="M 15,-65 Q 30,-40 25,0" fill="none" stroke="#00ffff" stroke-width="2" stroke-dasharray="4,2"/>

    <!-- THE ORO (Coin) floating above hands / chest -->
    <g transform="translate(0, 35) scale(0.9)">
       <use href="#cyberCoinFull"/>
    </g>

    <!-- Arms resting on/casting the Coin -->
    <path d="M -25,-30 Q -40,0 -20,25" fill="none" stroke="#111" stroke-width="6" stroke-linecap="round"/>
    <path d="M -25,-30 Q -40,0 -20,25" fill="none" stroke="#ff00ff" stroke-width="2" stroke-linecap="round"/>
    
    <path d="M 25,-30 Q 40,0 20,25" fill="none" stroke="#111" stroke-width="6" stroke-linecap="round"/>
    <path d="M 25,-30 Q 40,0 20,25" fill="none" stroke="#00ffff" stroke-width="2" stroke-linecap="round"/>
  </g>

  <text x="100" y="280" font-family="'Courier New', monospace" font-size="8" fill="#00ffff" text-anchor="middle" letter-spacing="4" opacity="0.6">Peer2Play</text>
</svg>
