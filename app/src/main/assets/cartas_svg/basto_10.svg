<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05140a"/>
      <stop offset="50%" stop-color="#0a2b12"/>
      <stop offset="100%" stop-color="#021005"/>
    </linearGradient>
    <filter id="neonGlowGreen">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neonGlowLime">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge><feMergeNode in="blur2"/><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="circuit" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 20 L 10 20 L 15 15 L 25 15 L 30 20 L 40 20 M 20 0 L 20 10 L 25 15 M 15 15 L 20 25 L 20 40" fill="none" stroke="#ccff00" stroke-width="0.5" stroke-opacity="0.15"/>
    </pattern>
  </defs>

  <rect width="200" height="300" fill="url(#bgGrad)" rx="12" stroke="#444" stroke-width="1"/>
  <rect width="194" height="294" x="3" y="3" fill="url(#circuit)" rx="10"/>
  <path d="M 12 12 L 40 12 M 160 12 L 188 12 M 188 12 L 188 40 M 188 260 L 188 288 M 188 288 L 160 288 M 40 288 L 12 288 M 12 288 L 12 260 M 12 40 L 12 12" fill="none" stroke="#ccff00" stroke-width="3" filter="url(#neonGlowLime)"/>
  <path d="M 60 12 L 140 12 M 60 288 L 140 288 M 188 80 L 188 220 M 12 80 L 12 220" fill="none" stroke="#00ff00" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.8"/>

  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#fff" filter="url(#neonGlowLime)">10</text>
  <text x="22" y="44" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#ccff00">10</text>
  <g transform="translate(178, 256) rotate(180)">
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#fff" filter="url(#neonGlowLime)">10</text>
    <text x="0" y="0" font-family="'Courier New', monospace" font-weight="900" font-size="26" fill="#ccff00">10</text>
  </g>

  <!-- CYBER-OGRE (Caballo de Bastos) - FAT, imposing, mace resting on shoulder -->
  <g transform="translate(100, 158) scale(1.15)">

    <!-- Ground crack from sheer weight -->
    <g transform="translate(0, 88)">
      <line x1="-30" y1="0" x2="-15" y2="4" stroke="#00ff00" stroke-width="0.6" opacity="0.3"/>
      <line x1="25" y1="0" x2="12" y2="3" stroke="#00ff00" stroke-width="0.6" opacity="0.3"/>
      <line x1="-8" y1="0" x2="-5" y2="5" stroke="#ccff00" stroke-width="0.4" opacity="0.2"/>
      <ellipse cx="0" cy="0" rx="35" ry="4" fill="#00ff00" opacity="0.05" filter="url(#neonGlowGreen)"/>
    </g>

    <!-- === LEGS (short, thick, bowed under weight) === -->
    <!-- Left leg -->
    <path d="M -14,45 L -22,65 L -25,82" fill="none" stroke="#071407" stroke-width="16" stroke-linecap="round"/>
    <path d="M -14,45 L -22,65 L -25,82" fill="none" stroke="#00ff00" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Boot -->
    <path d="M -32,80 L -34,88 L -14,88 L -14,82" fill="#071407" stroke="#ccff00" stroke-width="1.2"/>

    <!-- Right leg -->
    <path d="M 14,45 L 20,64 L 22,80" fill="none" stroke="#071407" stroke-width="16" stroke-linecap="round"/>
    <path d="M 14,45 L 20,64 L 22,80" fill="none" stroke="#ccff00" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Boot -->
    <path d="M 14,78 L 12,86 L 32,86 L 30,79" fill="#071407" stroke="#ccff00" stroke-width="1.2"/>

    <!-- === TORSO (HUGE, round belly, wider than tall) === -->
    <!-- Main body mass -->
    <path d="M -35,45 Q -40,15 -30,-10 L -15,-28 L 15,-28 L 30,-10 Q 40,15 35,45 Z" fill="#071407" stroke="#00ff00" stroke-width="2"/>

    <!-- Belly plate (round, strained) -->
    <ellipse cx="0" cy="20" rx="28" ry="22" fill="#050f05" stroke="#ccff00" stroke-width="1.5"/>
    <!-- Belly tech lines (strained, bulging) -->
    <path d="M -20,12 Q 0,5 20,12" fill="none" stroke="#00ff00" stroke-width="0.8" opacity="0.4"/>
    <path d="M -22,20 Q 0,14 22,20" fill="none" stroke="#00ff00" stroke-width="0.8" opacity="0.4"/>
    <path d="M -20,28 Q 0,22 20,28" fill="none" stroke="#00ff00" stroke-width="0.8" opacity="0.4"/>
    <!-- Belly core (power source strained by fat) -->
    <circle cx="0" cy="18" r="5" fill="#021005" stroke="#ccff00" stroke-width="1.5"/>
    <circle cx="0" cy="18" r="2.5" fill="#ccff00" filter="url(#neonGlowLime)">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Chest plate (upper, partially hidden by gut) -->
    <path d="M -22,-5 L 0,4 L 22,-5" fill="none" stroke="#ccff00" stroke-width="1.5" filter="url(#neonGlowLime)"/>
    <!-- Rivet bolts -->
    <circle cx="-28" cy="5" r="2" fill="#0d1a0d" stroke="#ccff00" stroke-width="0.8"/>
    <circle cx="28" cy="5" r="2" fill="#0d1a0d" stroke="#ccff00" stroke-width="0.8"/>
    <circle cx="-25" cy="30" r="2" fill="#0d1a0d" stroke="#ccff00" stroke-width="0.8"/>
    <circle cx="25" cy="30" r="2" fill="#0d1a0d" stroke="#ccff00" stroke-width="0.8"/>

    <!-- Belt (straining, buckle about to pop) -->
    <path d="M -34,42 Q 0,48 34,42" stroke="#ccff00" stroke-width="3" fill="none"/>
    <rect x="-6" y="40" width="12" height="8" fill="#0d1a0d" stroke="#ccff00" stroke-width="1.2" rx="1"/>
    <circle cx="0" cy="44" r="2" fill="#ccff00" filter="url(#neonGlowLime)"/>

    <!-- === SHOULDERS (massive, uneven) === -->
    <!-- Left shoulder -->
    <path d="M -30,-10 L -48,-18 L -44,-30 L -32,-32 L -15,-22" fill="#0a1a0a" stroke="#00ff00" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="-42" cy="-24" r="3" fill="#ccff00" filter="url(#neonGlowLime)">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <!-- Shoulder spike -->
    <path d="M -44,-30 L -52,-42 L -42,-34" fill="#00ff00" opacity="0.4" filter="url(#neonGlowGreen)"/>

    <!-- Right shoulder (bigger, mace-bearing side) -->
    <path d="M 30,-10 L 50,-20 L 48,-34 L 35,-36 L 15,-22" fill="#0a1a0a" stroke="#ccff00" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="44" cy="-26" r="3" fill="#00ff00" filter="url(#neonGlowGreen)">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Double spike -->
    <path d="M 48,-34 L 56,-46 L 46,-38" fill="#ccff00" opacity="0.4" filter="url(#neonGlowLime)"/>
    <path d="M 44,-34 L 50,-50 L 42,-40" fill="#00ff00" opacity="0.3" filter="url(#neonGlowGreen)"/>

    <!-- === LEFT ARM (dangling, scratching belly) === -->
    <path d="M -34,-12 Q -48,10 -38,30" fill="none" stroke="#071407" stroke-width="12" stroke-linecap="round"/>
    <path d="M -34,-12 Q -48,10 -38,30" fill="none" stroke="#00ff00" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Forearm band -->
    <ellipse cx="-42" cy="12" rx="8" ry="3" fill="none" stroke="#ccff00" stroke-width="1" opacity="0.5"/>
    <!-- Pudgy hand -->
    <circle cx="-37" cy="33" r="7" fill="#071407" stroke="#00ff00" stroke-width="1.2"/>
    <circle cx="-37" cy="33" r="3" fill="#050f05"/>

    <!-- === RIGHT ARM (raised back, mace over shoulder) === -->
    <path d="M 34,-14 Q 46,-28 42,-48" fill="none" stroke="#071407" stroke-width="12" stroke-linecap="round"/>
    <path d="M 34,-14 Q 46,-28 42,-48" fill="none" stroke="#ccff00" stroke-width="2" stroke-linecap="round"/>
    <!-- Forearm band -->
    <ellipse cx="44" cy="-34" rx="8" ry="3" fill="none" stroke="#00ff00" stroke-width="1" transform="rotate(-20 44 -34)" opacity="0.5"/>

    <!-- === THE PLASMA WAR MACE (matching As design, on shoulder) === -->
    <g transform="translate(44, -54) rotate(-35)">
      <!-- Pommel -->
      <polygon points="-3,37 3,37 4,42 0,45 -4,42" fill="#0a1a0a" stroke="#ccff00" stroke-width="0.8"/>
      <circle cx="0" cy="40" r="1" fill="#ccff00" filter="url(#neonGlowLime)"/>
      <!-- Handle -->
      <rect x="-3.5" y="2" width="7" height="35" fill="#071407" stroke="#00ff00" stroke-width="1"/>
      <line x1="-3.5" y1="8" x2="3.5" y2="6" stroke="#ccff00" stroke-width="0.5" opacity="0.6"/>
      <line x1="-3.5" y1="14" x2="3.5" y2="12" stroke="#ccff00" stroke-width="0.5" opacity="0.6"/>
      <line x1="-3.5" y1="20" x2="3.5" y2="18" stroke="#ccff00" stroke-width="0.5" opacity="0.6"/>
      <line x1="-3.5" y1="26" x2="3.5" y2="24" stroke="#ccff00" stroke-width="0.5" opacity="0.6"/>
      <line x1="-3.5" y1="32" x2="3.5" y2="30" stroke="#ccff00" stroke-width="0.5" opacity="0.6"/>
      <!-- Handle conduits -->
      <line x1="-1.5" y1="4" x2="-1.5" y2="35" stroke="#00ff00" stroke-width="1" filter="url(#neonGlowGreen)" opacity="0.4"/>
      <line x1="1.5" y1="4" x2="1.5" y2="35" stroke="#00ff00" stroke-width="1" filter="url(#neonGlowGreen)" opacity="0.4"/>
      <!-- Handle nodes -->
      <circle cx="0" cy="12" r="1" fill="#ccff00" opacity="0.6"/>
      <circle cx="0" cy="24" r="1" fill="#ccff00" opacity="0.6"/>
      <!-- Guard with wings -->
      <polygon points="-9,2 9,2 7,-2 -7,-2" fill="#0d1a0d" stroke="#ccff00" stroke-width="1"/>
      <path d="M -7,0 L -14,-4 L -12,-8 L -5,-2" fill="#0a1a0a" stroke="#ccff00" stroke-width="0.8"/>
      <path d="M 7,0 L 14,-4 L 12,-8 L 5,-2" fill="#0a1a0a" stroke="#ccff00" stroke-width="0.8"/>
      <circle cx="-12" cy="-5" r="1" fill="#00ff00" filter="url(#neonGlowGreen)"/>
      <circle cx="12" cy="-5" r="1" fill="#00ff00" filter="url(#neonGlowGreen)"/>
      <!-- Shaft coil rings -->
      <ellipse cx="0" cy="-4" rx="8" ry="2" fill="none" stroke="#ccff00" stroke-width="1" filter="url(#neonGlowLime)"/>

      <!-- Mace head (octagonal, matching As) -->
      <polygon points="-16,-8 -12,-22 -5,-28 5,-28 12,-22 16,-8 12,4 -12,4" fill="#0a1a0a" stroke="#00ff00" stroke-width="2"/>
      <!-- Inner plating -->
      <polygon points="-11,-6 -8,-18 -3,-23 3,-23 8,-18 11,-6 8,1 -8,1" fill="#071407" stroke="#ccff00" stroke-width="1"/>
      <!-- Reinforcement bolts -->
      <circle cx="-12" cy="-6" r="1.2" fill="#0d1a0d" stroke="#ccff00" stroke-width="0.5"/>
      <circle cx="12" cy="-6" r="1.2" fill="#0d1a0d" stroke="#ccff00" stroke-width="0.5"/>
      <!-- Power vanes -->
      <path d="M -16,-14 L -24,-17 L -22,-10 L -16,-6" fill="#0a1a0a" stroke="#00ff00" stroke-width="1.2"/>
      <path d="M 16,-14 L 24,-17 L 22,-10 L 16,-6" fill="#0a1a0a" stroke="#00ff00" stroke-width="1.2"/>
      <path d="M 0,-28 L -4,-36 L 4,-36 Z" fill="#0a1a0a" stroke="#ccff00" stroke-width="1.2"/>
      <!-- Vane glows -->
      <circle cx="-22" cy="-14" r="2" fill="#ccff00" filter="url(#neonGlowLime)">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="22" cy="-14" r="2" fill="#ccff00" filter="url(#neonGlowLime)">
        <animate attributeName="opacity" values="1;0.4;1" dur="1.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="-34" r="2" fill="#ccff00" filter="url(#neonGlowLime)">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="0.8s" repeatCount="indefinite"/>
      </circle>
      <!-- Energy core (with star, matching As) -->
      <circle cx="0" cy="-12" r="7" fill="#021005" stroke="#00ff00" stroke-width="1.5"/>
      <circle cx="0" cy="-12" r="5" fill="#0a2b12" stroke="#ccff00" stroke-width="0.8"/>
      <polygon points="0,-18 2,-14 6,-12 2,-10 0,-6 -2,-10 -6,-12 -2,-14" fill="#ccff00" filter="drop-shadow(0 0 4px #ccff00)"/>
      <circle cx="0" cy="-12" r="2" fill="#fff" filter="url(#neonGlowLime)">
        <animate attributeName="r" values="1.5;3;1.5" dur="1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;1;0.6" dur="1s" repeatCount="indefinite"/>
      </circle>
      <!-- Core rotating ring -->
      <circle cx="0" cy="-12" r="9" fill="none" stroke="#ccff00" stroke-width="0.8" stroke-dasharray="3,5">
        <animateTransform attributeName="transform" type="rotate" from="0 0 -12" to="360 0 -12" dur="6s" repeatCount="indefinite"/>
      </circle>

      <!-- Electric arcs -->
      <path d="M -16,-14 Q -24,-6 -28,-14" fill="none" stroke="#ccff00" stroke-width="1" filter="url(#neonGlowLime)" opacity="0.5">
        <animate attributeName="d" values="M -16,-14 Q -24,-6 -28,-14;M -16,-14 Q -26,-20 -30,-12;M -16,-14 Q -24,-6 -28,-14" dur="0.4s" repeatCount="indefinite"/>
      </path>
      <path d="M 16,-14 Q 24,-6 28,-14" fill="none" stroke="#ccff00" stroke-width="1" filter="url(#neonGlowLime)" opacity="0.5">
        <animate attributeName="d" values="M 16,-14 Q 24,-6 28,-14;M 16,-14 Q 26,-20 30,-12;M 16,-14 Q 24,-6 28,-14" dur="0.5s" repeatCount="indefinite"/>
      </path>
    </g>

    <!-- === HEAD (small for body, pig-like, two beady eyes) === -->
    <g>
      <!-- No neck, head sits on shoulders -->
      <rect x="-8" y="-32" width="16" height="6" fill="#071407"/>

      <!-- Head (small, round, sinks into shoulders) -->
      <path d="M -16,-34 Q -18,-48 -14,-56 Q 0,-64 14,-56 Q 18,-48 16,-34 Z" fill="#071407" stroke="#00ff00" stroke-width="2"/>

      <!-- Heavy brow -->
      <path d="M -14,-48 Q 0,-53 14,-48" fill="#050f05" stroke="#ccff00" stroke-width="1.5"/>

      <!-- SINGLE CYCLOPEAN EYE (big, mean, glowing) -->
      <ellipse cx="0" cy="-46" rx="8" ry="6" fill="#021005" stroke="#00ff00" stroke-width="1.5"/>
      <ellipse cx="0" cy="-46" rx="5.5" ry="4.5" fill="#0a2b12" stroke="#ccff00" stroke-width="0.8"/>
      <circle cx="0" cy="-46" r="3" fill="#ccff00" filter="url(#neonGlowLime)"/>
      <ellipse cx="0" cy="-46" rx="1.2" ry="3" fill="#000"/>
      <circle cx="-1.5" cy="-48" r="1" fill="#fff" opacity="0.4"/>
      <circle cx="0" cy="-46" r="10" fill="none" stroke="#ccff00" stroke-width="0.5" opacity="0.2" filter="url(#neonGlowLime)">
        <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.1;0.25;0.1" dur="2s" repeatCount="indefinite"/>
      </circle>

      <!-- Snout / nose (pig-like, flat) -->
      <ellipse cx="0" cy="-40" rx="5" ry="3" fill="#050f05" stroke="#00ff00" stroke-width="1"/>
      <circle cx="-2" cy="-40" r="1" fill="#021005"/>
      <circle cx="2" cy="-40" r="1" fill="#021005"/>

      <!-- Mouth (wide grin, tusks) -->
      <path d="M -10,-35 Q 0,-30 10,-35" fill="none" stroke="#00ff00" stroke-width="1.2"/>
      <!-- Tusks (protruding upward) -->
      <path d="M -8,-35 L -10,-42 L -6,-38" fill="#ccff00" opacity="0.8"/>
      <path d="M 8,-35 L 10,-42 L 6,-38" fill="#ccff00" opacity="0.8"/>

      <!-- Head implants -->
      <circle cx="-14" cy="-50" r="1.5" fill="#0d1a0d" stroke="#ccff00" stroke-width="0.8"/>
      <circle cx="14" cy="-50" r="1.5" fill="#0d1a0d" stroke="#ccff00" stroke-width="0.8"/>
      <!-- Cables from implants -->
      <path d="M -14,-52 Q -18,-58 -15,-64" fill="none" stroke="#00ff00" stroke-width="1.5"/>
      <path d="M 14,-52 Q 18,-58 15,-64" fill="none" stroke="#00ff00" stroke-width="1.5"/>
      <circle cx="-15" cy="-64" r="1.2" fill="#ccff00" filter="url(#neonGlowLime)" opacity="0.5">
        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="15" cy="-64" r="1.2" fill="#ccff00" filter="url(#neonGlowLime)" opacity="0.5">
        <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.8s" repeatCount="indefinite"/>
      </circle>

      <!-- Scar -->
      <line x1="8" y1="-54" x2="-4" y2="-36" stroke="#ccff00" stroke-width="0.8" opacity="0.3"/>
    </g>
  </g>

  <text x="100" y="280" font-family="'Courier New', monospace" font-size="8" fill="#ccff00" text-anchor="middle" letter-spacing="4" opacity="0.6">Peer2Play</text>
</svg>
